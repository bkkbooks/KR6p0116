body:
  text: 蓮宗必讀總序淨土法門者乃諸佛究竟之法也故彌陀因地觀此理而大誓普收釋迦果成稱此理而廣舌深讚彼則鉅賢至聖咸舒藻以為盟此則覺德鴻儒盡擒毫而作誓挺身立行力修此道者列宿塵沙莫況其多也下至惡逆凡夫十念便登寶土飛禽畜類隨稱亦達金池此非彌陀願力安能若是經云末法億億人修行罕一得道唯依念佛得度靈峰云於念佛法門中求其至簡易至直捷者莫若信願專持名號是故淨土三經並行古人獨以彌陀經為日課豈非持名一法普被三根攝事理無遺統宗教無外尤不可思議也哉其名號功德自何而始乃因六八大願之所莊嚴九品悲心之所成就也然彼佛願力雖不可思議若厭離不深則娑婆業繫不脫故藉五王八苦之緣以作進修之䇿而進修儀軌甚多唯慈雲行願最為切要其上根之士一聞便信中下之輩多諸疑惑智者十疑論統淨宗一切疑問振菩提大道之綱斷疑生信厥功最巨善導云修餘行業迂僻難成唯此法門速超生死若專修者十即十生法照大師感文殊告曰汝今念佛正是其時當知念佛諸法之王慧日感觀音亦云汝當知淨土法門勝過諸行二大士皆法王長子親口傳授念佛法門殷勤如此可不信哉飛錫永明四明慈照優曇天如妙叶楚石幽溪等乃傳宗列祖闡教聖師皆撰文述偈深勸往生當細心玩味而詳擇之蕅益法師每見學者未識方隅靡慚濫吹或云念佛散心無益或云念佛須一心不亂或云念佛須參究是誰詰其信願毫無所知可悲也夫如意珠王遇此等人而成瓦礫以此故述信願持名歷九品說行者宜勤覧之又云得生與否全田信願之有無品位高下全由持名之深淺堅密云一句彌陀非大徹不能全提而最愚亦無少欠只貴一心受持甯羨依稀解悟省庵云暫持聖號勝於布施百年一發大心超過修行歷劫徹悟云淨土一門最初省求悟門末後不待發慧不須懺業不斷煩惱至極省要至極徑捷及其證入至極廣大至極究竟故要解云一聲阿彌陀佛即釋迦本師於五濁惡世所得之阿耨多羅三藐三菩提法今以此果覺全體授與濁惡眾生乃諸佛所行境界唯佛與佛能究盡非九界自力所能信解也如上所述咸遵佛祖誠言非敢臆說撮其詞明義顯最切要者會成一冊以便朝暮莊誦刻刻提撕如面聆法音不敢疑貳名之曰蓮宗必讀余為障緣深重濁智騰波非專修一行生死難脫匪憑聖教信願難階況去聖時遙邪風競起正行之人多被惑亂是故必讀此書然後必生淨土愧鄙見隘劣焉敢公諸勝友但自為鞭䇿而作往生左券敬摘諸文而謬為之序戊辰仲春淨業弟子古崑謹集敬採佛祖誠實言成就往生決定信普願法界諸眾生速脫輪迴生安養願我早登下下品免得娑婆受苦辛待吾一見彌陀後盡未來際度羣生蓮宗必讀總目佛說阿彌陀經無量壽經四十八願觀經九品觀章佛說五王八苦經慈雲決疑行願二門智者大師十疑論善導和尚專修法門法照大師感見文殊慧日法師感見觀音飛錫法師高聲念佛永明壽禪師誡勿輕淨土四明尊者勸念佛疏慈照宗主勸發願偈優曇和尚蓮宗寶鑑天如禪師淨土或問妙叶禪師念佛直指楚石琦禪師淨土詩幽溪法師淨土法語蕅益法師持名九品堅密大師淨要總序省菴法師菩提心文徹悟禪師念佛法語佛說阿彌陀經姚秦三藏法師鳩摩羅什譯如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘僧千二百五十人俱皆是大阿羅漢眾所知識長老舍利弗摩訶目犍連摩訶迦葉摩訶迦旃延摩訶俱絺羅離婆多周利槃陀伽難陀阿難陀羅睺羅憍梵波提賓頭盧頗羅墮迦留陀夷摩訶劫賓那薄拘羅阿菟樓䭾如是等諸大弟子并諸菩薩摩訶薩文殊師利法王子阿逸多菩薩乾陀訶提菩薩常精進菩薩與如是等諸大菩薩及釋提桓因等無量諸天大眾俱爾時佛告長老舍利弗從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在說法舍利弗彼土何故名為極樂其國眾生無有眾苦但受諸樂故名極樂又舍利弗極樂國土七重欄楯七重羅網七重行樹皆是四寶周帀圍繞是故彼國名為極樂又舍利弗極樂國土有七寶地八功德水充滿其中池底純以金沙布地四邊階道金銀琉璃玻瓈合成上有樓閣亦以金銀琉璃玻瓈𤥭璖赤珠碼碯而嚴飾之池中蓮華大如車輪青色青光黃色黃光赤色赤光白色白光微妙香潔舍利弗極樂國土成就如是功德莊嚴又舍利弗彼佛國土常作天樂黃金為地晝夜六時雨天曼陀羅華其土眾生常以清旦各以衣裓盛眾妙華供養他方十萬億佛即以食時還到本國飯食經行舍利弗極樂國土成就如是功德莊嚴復次舍利弗彼國常有種種奇妙雜色之鳥白鶴孔鸚鵡舍利迦陵頻伽共命之鳥是諸眾鳥晝夜六時出和雅音其音演暢五根五力七菩提分八聖道分如是等法其土眾生聞是音已皆悉念佛念法念僧舍利弗汝勿謂此鳥實是罪報所生所以者何彼佛國土無三惡道舍利弗其佛國土尚無惡道之名何況有實是諸眾鳥皆是阿彌陀佛欲令法音宣流變化所作舍利弗彼佛國土微風吹動諸寶行樹及寶羅網出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心舍利弗其佛國土成就如是功德莊嚴舍利弗於汝意云何彼佛何故號阿彌陀舍利弗彼佛光明無量照十方國無所障礙是故號為阿彌陀又舍利弗彼佛壽命及其人民無量無邊阿僧祇劫故名阿彌陀舍利弗阿彌陀佛成佛已來於今十劫又舍利弗彼佛有無量無邊聲聞弟子皆阿羅漢非是算數之所能知諸菩薩眾亦復如是舍利弗彼佛國土成就如是功德莊嚴又舍利弗極樂國土眾生生者皆是阿跋致其中多有一生補處其數甚多非是算數所能知之但可以無量無邊阿僧祇說舍利弗眾生聞者應當發願願生彼國所以者何得與如是諸上善人俱會一處舍利弗不可以少善根福德因緣得生彼國舍利弗若有善男子善女人聞說阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂其人臨命終時阿彌陀佛與諸聖眾現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土舍利弗我見是利故說此言若有眾生聞是說者應當發願生彼國土舍利弗如我今者讚歎阿彌陀佛不可思議功德之利東方亦有阿閦佛須彌相佛大須彌佛須彌光佛妙音佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經舍利弗南方世界有日月燈佛名聞光佛大𦦨肩佛須彌燈佛無量精進佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經舍利弗西方世界有無量壽佛無量相佛無量幢佛大光佛大明佛寶相佛淨光佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經舍利弗北方世界有𦦨肩佛最勝音佛難沮佛日生佛網明佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經舍利弗下方世界有師子佛名聞佛名光佛達摩佛法幢佛持法佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經舍利弗上方世界有梵音佛宿王佛香上佛香光佛大𦦨肩佛雜色寶華嚴身佛娑羅樹王佛寶華德佛見一切義佛如須彌山佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經舍利弗於汝意云何何故名為一切諸佛所護念經舍利弗若有善男子善女人聞是經受持者及聞諸佛名者是諸善男子善女人皆為一切諸佛之所護念皆得不退轉於阿耨多羅三藐三菩提是故舍利弗汝等皆當信受我語及諸佛所說舍利弗若有人已發願今發願當發願欲生阿彌陀佛國者是諸人等皆得不退轉於阿耨多羅三藐三菩提於彼國土若已生若今生若當生是故舍利弗諸善男子善女人若有信者應當發願生彼國土舍利弗如我今者稱讚諸佛不可思議功德彼諸佛等亦稱讚我不可思議功德而作是言釋迦牟尼佛能為甚難希有之事能於娑婆國土五濁惡世劫濁見濁煩惱濁眾生濁命濁中得阿耨多羅三藐三菩提為諸眾生說是一切世間難信之法舍利弗當知我於五濁惡世行此難事得阿耨多羅三藐三菩提為一切世間說此難信之法是為甚難佛說此經已舍利弗及諸比丘一切世間天人阿修羅等聞佛所說歡喜信受作禮而去要解云此經是無問自說徹底大慈之所加持能分末法多障有情依斯徑登不退故當來經法滅盡特留此經住世百年廣度含識阿伽陀藥萬病總持絕待圓融不可思議華嚴奧藏法華祕髓一切諸佛之心要菩薩萬行之司南皆不出於此矣佛說無量壽經四十八願曹魏康僧鎧譯佛告阿難過去久遠無央數劫世自在王佛興出於世時有國王聞佛說法心懷悅豫尋發無上正真道意棄國捐王行作沙門號曰法藏詣彼佛所稽首禮足遶佛三帀合掌而住白佛言世尊唯垂聽察如我所願當具說之第一願設我得佛國有地獄餓鬼畜生者不取正覺第二願設我得佛國中天人壽終之後復更三惡道者不取正覺第三願設我得佛國中天人不悉真金色者不取正覺第四願設我得佛國中天人形色不同有好醜者不取正覺第五願設我得佛國中天人不識宿命下至知百千億那由他諸劫事者不取正覺第六願設我得佛國中天人不得天眼下至見百千億那由他諸佛國者不取正覺第七願設我得佛國中天人不得天耳下至聞百千億那由他諸佛所說不得受持者不取正覺第八願設我得佛國中天人不得見他心智下至知百千億那由他諸佛國中眾生心念者不取正覺第九願設我得佛國中天人不得神足於一念頃下至不能超過百千億那由他諸佛國者不取正覺第十願設我得佛國中天人若起想念貪計身者不取正覺第十一願設我得佛國中天人不住定聚必至滅度者不取正覺第十二願設我得佛光明有限量下至不照百千億那由他諸佛國者不取正覺第十三願設我得佛壽命有限量下至百千億那由他劫者不取正覺第十四願設我得佛國中聲聞有能計量乃至三千大千世界眾生悉成緣覺於百千劫悉共計較知其數者不取正覺第十五願設我得佛國中天人壽命無能限量除其本願修短自在若不爾者不取正覺第十六願設我得佛國中天人乃至聞有不善名者不取正覺第十七願設我得佛十方世界無量諸佛不悉咨嗟稱我名者不取正覺第十八願設我得佛十方眾生至心信樂欲生我國乃至十念若不生者不取正覺唯除五逆誹謗正法第十九願設我得佛十方眾生發菩提心修諸功德至心發願欲生我國臨壽終時假令不與大眾圍繞現其人前者不取正覺第二十願設我得佛十方眾生聞我名號繫念我國植種德本至心迴向欲生我國不果遂者不取正覺第二十一願設我得佛國中天人不悉成滿三十二大人相者不取正覺第二十二願設我得佛他方佛土諸菩薩眾來生我國究竟必至一生補處除其本願自在所化為眾生故被弘誓鎧積累德本度脫一切遊諸佛國修菩薩行供養十方諸佛如來開化恒沙無量眾生使立無上正真之道超出常倫諸地之行現前修習普賢之德若不爾者不取正覺第二十三願設我得佛國中菩薩承佛神力供養諸佛一食之頃不能遍至無數無量億那由他諸佛國者不取正覺第二十四願設我得佛國中菩薩在諸佛前現其德本諸所求欲供養之具若不如意者不取正覺第二十五願設我得佛國中菩薩不能演說一切智者不取正覺第二十六願設我得佛國中菩薩不得金剛那羅延身者不取正覺第二十七願設我得佛國中天人一切萬物嚴淨光麗形色殊特窮微極妙無能稱量其諸眾生乃至逮得天眼有能明了辨其名數者不取正覺第二十八願設我得佛國中菩薩乃至少功德者不能知見其道場樹無量光色高四百萬里者不取正覺第二十九願設我得佛國中菩薩若受讀經法諷誦持說而不得辯才智慧者不取正覺第三十願設我得佛國中菩薩智慧辯才若可限量者不取正覺第三十一願設我得佛國土清淨皆悉照見十方一切無量無數不可思議諸佛世界猶如明鏡覩其面像若不爾者不取正覺第三十二願設我得佛自地以上至於虗空宮殿樓觀池流華樹國土所有一切萬物皆以無量雜寶百千種香而共合成嚴飾奇妙超諸天人其香普熏十方世界菩薩聞者皆修佛行若不如是不取正覺第三十三願設我得佛十方無量不可思議諸佛世界眾生之類蒙我光明觸其身者身心柔輭超過天人若不爾者不取正覺第三十四願設我得佛十方無量不可思議諸佛世界眾生之類聞我名字不得菩薩無生法忍諸深總持者不取正覺第三十五願設我得佛十方無量不可思議諸佛世界其有女人聞我名字歡喜信樂發菩提心厭惡女身壽終之後復為女像者不取正覺第三十六願設我得佛十方無量不可思議諸佛世界諸菩薩眾聞我名字壽終之後常修梵行至成佛道若不爾者不取正覺第三十七願設我得佛十方無量不可思議諸佛世界諸天人民聞我名字五體投地稽首作禮歡喜信樂修菩薩行諸天世人莫不致敬若不爾者不取正覺第三十八願設我得佛國中天人欲得衣服隨念即至如佛所讚應法妙服自然在身有求裁縫擣染浣濯者不取正覺第三十九願設我得佛國中天人所受快樂不如漏盡比丘者不取正覺第四十願設我得佛國中菩薩隨意欲見十方無量嚴淨佛土應時如願於寶樹中皆悉照見猶如明鏡覩見其面像若不爾者不取正覺第四十一願設我得佛他方國土諸菩薩眾聞我名字至於得佛諸根缺陋不具足者不取正覺第四十二願設我得佛他方國土諸菩薩眾聞我名字皆悉逮得清淨解脫三昧住是三昧一發意頃供養無量不可思議諸佛世尊而不失定意若不爾者不取正覺第四十三願設我得佛他方國土諸菩薩眾聞我名字壽終之後生尊貴家若不爾者不取正覺第四十四願設我得佛他方國土諸菩薩眾聞我名字歡喜踊躍修菩薩行具足德本若不爾者不取正覺第四十五願設我得佛他方國土諸菩薩眾聞我名字皆悉逮得普等三昧住是三昧至於成佛常見無量不可思議一切諸佛若不爾者不取正覺第四十六願設我得佛國中菩薩隨其志願所欲聞法自然得聖若不爾者不取正覺第四十七願設我得佛他方國土諸菩薩眾聞我名字不即得至不退轉者不取正覺第四十八願設我得佛他方國土諸菩薩眾聞我名字不即得至第一忍第二第三法忍於諸佛法不能即得不退轉者不取正覺爾時法藏比丘說此願已應時普地六種震動天雨妙華以散其上空中讚言決定必成無上正覺佛說觀無量壽佛經九品觀章劉宋西域三藏法師畺良耶舍譯佛告阿難及韋提希若欲至心生西方者先當觀於一丈六像在池水上如先所說無量壽佛身量無邊非是凡夫心力所及然彼如來宿願力故有憶想者必得成就但想佛像得無量福況復觀佛具足身相阿彌陀佛神通如意於十方國變現自在或現大身滿虗空中或現小身丈六八尺所現之形皆真金色圓光化佛及寶蓮華如上所說觀世音菩薩及大勢至於一切處身同眾生但觀首相知是觀世音知是大勢至此二菩薩助阿彌陀佛普化一切是為雜想觀名第十三觀佛告阿難及韋提希上品上生者若有眾生願生彼國者發三種心即便往生何等為三一者至誠心二者深心三者回向發願心具三心者必生彼國復有三種眾生當得往生何等為三一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念回向發願願生彼國具此功德一日乃至七日即得往生生彼國時此人精進勇猛故阿彌陀如來與觀世音大勢至無數化佛百千比丘聲聞大眾無量諸天七寶宮殿觀世音菩薩執金剛臺與大勢至菩薩至行者前阿彌陀佛放大光明照行者身與諸菩薩授手迎接觀世音大勢至與無數菩薩讚歎行者勸進其心行者見已歡喜踊躍自見其身乘金剛臺隨從佛後如彈指頃往生彼國生彼國已見佛色身眾相具足見諸菩薩色相具足光明寶林演說妙法聞已即悟無生法忍經須臾間歷事諸佛徧十方界於諸佛前次第受記還至本國得無量百千陀羅尼門是名上品上生者上品中生者不必受持讀誦方等經典善解義趣於第一義心不驚動深信因果不謗大乘以此功德回向願求生極樂國行此行者命欲終時阿彌陀佛與觀世音大勢至無量大眾眷屬圍繞持紫金臺至行者前讚言法子汝行大乘解第一義是故我今來迎接汝與千化佛一時授手行者自見坐紫金臺合掌叉手讚歎諸佛如一念頃即生彼國七寶池中此紫金臺如大寶華經宿則開行者身作紫磨金色足下亦有七寶蓮華佛及菩薩俱時放光照行者身目即開明因前宿習普聞眾聲純說甚深第一義諦即下金臺禮佛合掌讚歎世尊經於七日應時即於阿耨多羅三藐三菩提得不退轉應時即能飛行徧至十方歷事諸佛於諸佛所修諸三昧經一小劫得無生忍現前授記是名上品中生者上品下生者亦信因果不謗大乘但發無上道心以此功德回向願求生極樂國行者命欲終時阿彌陀佛及觀世音大勢至與諸菩薩持金蓮華化作五百佛來迎此人五百化佛一時授手讚言法子汝今清淨發無上道心我來迎汝見此事時即自見身坐金蓮華坐已華合隨世尊後即得往生七寶池中一日一夜蓮華乃開七日之中乃得見佛雖見佛身於眾相好心不明了於三七日後乃了了見聞眾音聲皆演妙法遊歷十方供養諸佛於諸佛前聞甚深法經三小劫得百法明門住歡喜地是名上品下生者是名上輩生想佛告阿難及韋提希中品上生者若有眾生受持五戒持八戒齋修行諸戒不造五逆無眾過患以此善根回向願求生於西方極樂世界臨命終時阿彌陀佛與諸比丘眷屬圍繞放金色光至其人所演說苦空無常無我讚歎出家得離眾苦行者見已心大歡喜自見己身坐蓮華臺長跪合掌為佛作禮未舉頭頃即得往生極樂世界蓮華尋開當華敷時聞眾音聲讚歎四諦應時即得阿羅漢道三明六通具八解脫是名中品上生者中品中生者若有眾生若一日一夜持八戒齋若一日一夜持沙彌戒若一日一夜持具足戒威儀無缺以此功德回向願求生極樂國戒香熏修如此行者命欲終時見阿彌陀佛與諸眷屬放金色光持七寶蓮華至行者前行者自聞空中有聲讚言善男子如汝善人隨順三世諸佛教故我來迎汝行者自見坐蓮華上蓮華即合生於西方極樂世界在寶池中經於七日蓮華乃敷華既敷已開目合掌讚歎世尊聞法歡喜得須陀洹經半劫已成阿羅漢是名中品中生者中品下生者若有善男子善女人孝養父母行世仁慈此人命欲終時遇善知識為其廣說阿彌陀佛國土樂事亦說法藏比丘四十八願聞此事已尋即命終譬如壯士屈伸臂頃即生西方極樂世界經七日已遇觀世音及大勢至聞法歡喜得須陀洹過一小劫成阿羅漢是名中品下生者是名中輩生想佛告阿難及韋提希下品上生者或有眾生作眾惡業雖不誹謗方等經典如此愚人多造惡法無有慚愧命欲終時遇善知識為說大乘十二部經首題名字以聞如是諸經名故除却千劫極重惡業智者復教合掌叉手稱南無阿彌陀佛稱佛名故除五十億劫生死之罪爾時彼佛即遣化佛化觀世音化大勢至至行者前讚言善男子以汝稱佛名故諸罪消滅我來迎汝作是語已行者即見化佛光明徧滿其室見已歡喜即便命終乘寶蓮華隨化佛後生寶池中經七七日蓮華乃敷當華敷時大悲觀世音菩薩及大勢至菩薩放大光明住其人前為說甚深十二部經聞已信解發無上道心經十小劫具百法明門得入初地是名下品上生者佛告阿難及韋提希下品中生者或有眾生毀犯五戒八戒及具足戒如此愚人偷僧祇物盜現前僧物不淨說法無有慚愧以諸惡業而自莊嚴如此罪人以惡業故應墮地獄命欲終時地獄眾火一時俱至遇善知識以大慈悲即為讚說阿彌陀佛十力威德廣讚彼佛光明神力亦讚戒定慧解脫解脫知見此人聞已除八十億劫生死之罪地獄猛火化為清涼風吹諸天華華上皆有化佛菩薩迎接此人如一念頃即得往生七寶池中蓮華之內經於六劫蓮華乃敷觀世音大勢至以梵音聲安慰彼人為說大乘甚深經典聞此法已應時即發無上道心是名下品中生者佛告阿難及韋提希下品下生者或有眾生作不善業五逆十惡具諸不善如此愚人以惡業故應墮惡道經歷多劫受苦無窮如此愚人臨命終時遇善知識種種安慰為說妙法教令念佛彼人苦逼不遑念佛善友告言汝若不能念彼佛者應稱無量壽佛如是至心令聲不絕具足十念稱南無阿彌陀佛稱佛名故於念念中除八十億劫生死之罪命終之時見金蓮華猶如日輪住其人前如一念頃即得往生極樂世界於蓮華中滿十二大劫蓮華方開觀世音大勢至以大悲音聲為其廣說諸法實相除滅罪法聞已歡喜應時即發菩提之心是名下品下生者是名下輩生想佛告阿難行此三昧者現身得見無量壽佛及二大士若善男子及善女人但聞佛名二菩薩名除無量劫生死之罪何況憶念若念佛者當知此人則是人中芬陀利華觀世音菩薩大勢至菩薩為其勝友當坐道場生諸佛家智者大師將入滅命施牀東壁面向西方專稱阿彌陀佛令讀四十八願九品觀章唱無量壽經及觀經題竟乃顧大眾合掌讚曰四十八願莊嚴淨土華池寶樹易往無人火車相現一念改悔者尚得往生況戒慧熏修聖行道力功不唐捐矣佛說五王八苦經北藏當字號附東晉錄昔者有五王國界相近共相往來不相攻伐唯作善友其最大者字普安王習菩薩行餘四小王常習邪行大王憐憫意欲度之呼來上殿共相娛樂乃至七日終日竟夜作娼妓樂七日已滿四小王共白大王言國事甚多請還政治大王語諸左右嚴駕車乘羣臣吏民都共送之至其半道大王憐愍意欲度之語諸小王曰各說所樂悅樂之情一王答言我願欲得陽春三月樹木榮華遊戲原野是我之樂一王復言我所樂異願我常作國王鞍馬服飾樓閣殿堂官屬人民圍繞左右晃晃煜煜搥鐘鳴鼓出入行來路人傾目是我之樂一王復言我所樂異願復得好婦好兒端正無雙共相娛樂極情快意是我之樂一王復言我所樂復異願我父母常在多有兄弟妻子羅列好衣美食以恣其口素琴青衣共相娛樂是我之樂各自說其所樂竟四王俱回頭白其大王所樂何事大王答言我先說卿等所樂然後說我之樂卿一人言陽春三月樹木榮華遊戲原野秋則彫落非是久樂卿一人復言願我常作國王鞍馬服飾樓閣殿堂官屬人民圍遶左右晃晃煜煜搥鐘鳴鼓出入行來路人傾目往古諸王隱隱賑賑快樂無極福德轉盡諸國相伐忽然崩亡非是久樂卿一人復言願得好婦好兒端正無雙共相娛樂極情快意一朝疾病憂苦無量此非久樂卿一人復言願我父母常在多有兄弟妻子羅列好衣美食以恣其口素琴青衣共相娛樂一朝有事為官所執繫閉在獄無有救護此非久樂四人俱問王樂云何王言我樂不生不死不苦不樂不饑不渴不寒不熱存亡自在此是我樂四王俱言此樂何處當有明師大王答言吾師號曰為佛近在祇洹精舍諸王歡喜各詣佛所稽首作禮退坐一面大王胡跪合掌白佛言我等今得為人闇鈍無知但深著世樂不知罪福願佛為弟子等說其苦諦佛言卿等善聽當為汝說人生在世常有無量眾苦切身今粗為汝等略說八苦何為八苦生苦老苦病苦死苦恩愛別苦所求不得苦怨憎會苦憂悲惱苦是為八苦也何謂生苦人死之時不知精神趣向何道未知生處竝受中陰之形至三七日中父母和合便來受胎一七日如薄酪二七日如稠酪三七日如凝酥四七日如肉臠五胞成就巧風入腹吹其身體六情開張在母腹中生臟之下熟臟之上母噉一杯熱食灌其身體如入鑊湯母飲一杯冷水亦如寒冰切體母飽之時迫逼身體痛不可言母饑之時腹中了𠄏亦如倒懸受苦無量至其滿月欲生之時頭下向產門如兩石夾山欲生之時母危父怖生墮草上身體細軟草觸其身如履刀劍忽然失聲大喚此是苦不諸人咸言實是大苦何謂老苦父母養育至年長大自用強健擔輕負重不自裁量寒時極寒熱時極熱饑時極饑飽時極飽無有節度漸至年老頭白齒落目視𥆨𥆨耳聽不聰盛去衰至皮緩面皺百節痛疼行步極苦坐起呻吟憂悲心惱識神轉滅便旋即忘命日促儘言之流涕坐起須人此是苦不大王答曰實是大苦何謂病苦人有四大和合而成其身何謂四大地大水大火大風大一大不調百一病生四大不調四百四病同時共作地大不調舉身皆痛水大不調舉身䏺腫火大不調舉身蒸熱風大不調舉身掘強百節苦痛猶被杖楚四大進退手足不任氣力虗竭坐起須人口燥脣燋筋斷鼻拆目不見色耳不聞音不淨流出身臥其上心懷苦惱言輒悲哀六親在側晝夜看視初無休息甘饍美食入口皆苦此是苦不王答曰實是大苦何謂死苦人死之時四百四病同時俱作四大欲散魂神不安欲死之時刀風解形無處不痛白汗流出兩手摸空室家內外在其左右憂悲涕哭痛徹骨髓不能自勝死者去之風去氣絕火滅身冷風先火次魂靈去矣身體挺直無所復知旬日之間肉壞血流䏺脹爛臭甚不可近棄之曠野眾鳥噉食肉盡骨乾髑髏異處此是苦不答言實是大苦何謂恩愛別苦室家內外兄弟妻子共相戀慕一朝破亡為人抄劫各自分張父東子西母南女北非唯一處為人奴婢各自悲呼心內斷絕𥥆𥥆冥冥無有相見之期此是苦不答言實是大苦何謂所求不得苦家有財物散盡追求大官吏民望得富貴勤苦求之求之不止會遇得之而作邊境令長未經幾時貪取民物為人告言一朝有事檻車載去欲殺之時憂苦無量不知死活何日此是苦不答曰實是大苦何謂怨憎會苦世人薄俗共居愛欲之中爭不急之事更相殺害遂成大怨各自相避隱藏無處各磨刀錯箭挾弓持杖恐忽相見會遇狹道相逢張弓注箭兩刀相向不知勝負是誰當爾之時怖畏無量此是苦不答曰實是大苦何謂憂悲惱苦人生在世長命者乃至百歲矩命者胞胎傷墮長命之者與斯百歲夜消其半餘有五十年在醉酒疾病不知作人已減五年小時愚癡十五年過未知禮儀年中八十老耄無知耳聾目冥無有法則復減二十年已九十年過餘十歲之中多有諸愁憂天下欲亂時亦愁天下旱時亦愁天下大水亦愁天下大霜亦愁天下大熱亦愁室家內外多諸病痛亦愁持家財物治生恐失亦愁官家百調未輸亦愁家人遭縣官事閉繫在獄未知出期亦愁兄弟妻子遠行未歸亦愁居家窮寒無有衣食亦愁此舍村落有事亦愁社稷不辦亦愁室家死亡無有財物殯葬亦愁至春時種作無有犁牛亦愁如是種種憂愁常無樂時至其節日共相集聚應當歡喜方共悲涕相向此是苦不答曰實是大苦爾時五王及諸羣臣會中數千萬人聞佛說諸苦諦心開意悟即得須陀洹道皆大歡喜作禮而去四王俱白普安王言大王真是大權菩薩化導我等令得道跡大王之恩我本觀諸宮殿心情愛著不能遠離今覩宮殿如視穢廁無可樂者即捨王位付弟出家為道修諸功德日日無倦佛說五王八苦經終往生淨土決疑行願二門宋耆山沙門遵式述維安養寶剎大覺攸贊三輩高升夕孕金華列宿猶慚於海滴晨遊玉沼世鐙強喻於河沙良以十方爰來四生利往雖騰光而普示終稽首而偏求故其竺國皇州自今觀古彼則鉅賢至聖咸舒藻以為盟文殊普賢天親龍樹等或別譯願文或著在經論此則覺德鴻儒盡摛毫而作誓且從晉世東林淨社劉雷等十八賢洎百二十三人同誓遺民屬詞其後冠蓋之士德望之僧潔志之俗富於編簡自茲回向綿續倡和相尋誠道德之通衢常樂之直濟也但世多創染割截未識方隅忽遇問津靡慚濫吹或攘臂排為小教或大笑斥作權乘以其言既反經人惑常典遂輒述往生淨土決疑行願二門詞愧不文理存或當菽麥視而且辨涇渭挹而永分剪伊蘭之臭林植栴檀之香幹信行願原始要終不數千言備舉矣第一決疑門一疑師二疑法三疑自第二行願門一禮懺門二十念門三繫緣門四眾福門第一決疑門者疑為信障世間小善尚不能成況菩提大道乎或曰智者有十疑論何須此文然略由三意一者上為王臣幾務稍暇難尋廣文今舉大綱略出行相易披覧易修行故二者十疑隨事釋難唯第二三略附理立且事無盡疑亦叵窮今直明一理為諸法源指源則流可識矣三者正對說者反經乖理自損損他故於疑法中簡小取大明白權實使來者不惑至道安和尚往生論六卷懷感法師羣疑論七卷道綽禪師安樂集三卷慈敏三藏淨土慈悲集三卷源信禪師淨土集二卷古今諸師製疏解經宗經造論隨情釋難伽陀讚揚同歸而各見尋究良難今以三疑收盡文出天台止觀非敢臆說一疑師者師有二邪外倒惑化人非所承也正法之師復有凡聖因果凡及因位容有未了猶清辨謂彌勒未是徧知俟龍華道後問津也今示西方令回向者唯果佛聖師釋迦及十方諸佛出廣長舌說誠實言讚勸往生更何所惑二疑法者佛法有小乘不了義大乘了義大乘復有了不了義今淨土唯大乘了義中了義也且小乘經部無一字勸生他方淨土天親論女人及二乘種不生此即明據也問小彌陀經等皆說彼國有聲聞鼓音王經佛母名殊勝妙顏亦復有女人答佛母恐指初降生時成正覺已國土隨淨必無女人或轉男如龍女或命終如悉達母聲聞如觀經疏及十疑論和會今明大乘復有三種一三乘通教門雖通大類狎二乘又當教菩薩雖化他淨佛國土化畢還同二乘歸於永滅淨土深理非彼所知非了義也二大乘別教明獨菩薩法雖談實理道後方證因果不融淨土則理外修成萬法乃不由心具雖塵劫修道廣遊佛剎指彼淨土因果但是體外方便斯亦未了三佛乘圓教詮旨圓融因果頓足經曰十方諦求更無餘乘唯一佛乘是則大乘中大乘了義中了義十方淨薉卷懷同在於剎那一念色心羅列徧收於法界並天真本具非緣起新成一念既然一塵亦爾故能一一塵中一切剎一一心中一切心一一心塵復互周重重無盡無障礙一時頓現非隱顯一切圓成無勝劣若神珠頓含眾寶猶帝網交映千光我心既然生佛體等如此方了迴神億剎實為自己心中孕質九蓮豈逃剎那際內苟事理攸隔淨薉相妨安令五逆凡夫十念便登寶土二乘賢輩迴心即達金池也哉信此圓談事無不達昧斯至理觸類皆迷華嚴云心如工畫師造種種五陰一切世間中無不從心造造通二種一理具十界依正一念頓足二變起全理緣起知無不為如心佛亦爾如佛眾生然心佛及眾生是三無差別由三無差方感應道交悲願相攝共變各變因果方成若但一理無差不曉諸法互具未善圓旨起信論所言法者謂眾生心直指凡心是心即攝一切世間六凡法界出世間法四聖法界也攝義亦二一理具二事造並攝十界十界之內身土淨薉何法不在依此示摩訶衍義摩訶衍大乘也若非此心安堪乘運十六觀諸佛是法界身入一切眾生心想中乃至是心作佛是心是佛般舟三昧佛是我心是我心見佛是我心作佛等談斯旨者大乘卷中粲然可舉至若法華妙部如來親記往生華嚴頓談普賢躬陳迴向是知彌陀因地觀此理而大誓普收釋迦果成稱此理而廣舌深讚十方三世莫不咸然問妙理圓極世人盡須觀行始生耶答不然今但直決疑情令知淨土百寶莊嚴九品因果並在眾生介爾心中理性具足方得往生事用隨願自然是則旁羅十方不離當念往來法界正恊唯心免信常流執此非彼其九品生相各有行類上輩三品須解須行故云汝行大乘解第一義學者見賢思齊企金座而高升當妙觀之是托若中下六品生因只精持禁戒行世仁慈至下下品本是惡逆十念精誠便生彼國但知有淨土盡可迴心也世人縱云淨土出大乘不能如上約教甄簡甯逃混濫未足決疑三疑自者博地凡夫世緣纏蓋云何此身生淨土入賢聖海同正定聚釋曰若了如上法性虗通及信彌陀本願攝受但勤功福甯俟問津況十念得生唯除五逆及謗正法又定心十念逆謗亦生正願志求夫復何惑第二正修行願門者略開四門一禮懺二十念三繫緣四眾福修行整足唯須此四先禮佛淨除業障身心皎潔如淨良田次十念定心成行立願要期植往生正因如下種子次繫心愛護長養滋發芽莖如霔膏雨次眾福助令繁茂使速成華果如灌肥膩具修此四最上最勝或少暇隨修三二一者皆生彼國以四門各有行願皆是正因故也亦可六齋日修懺日日中修十念以十念是淨因要切必不可廢後二門任力所能若不然者但隨所欲任意行之禮懺門者日日早晨於常供道場中冠帶服飾端莊謹肅佛像前手自燒香合掌定心作是云一切恭敬一心頂禮常住三寶存心徧禮十方三世一切佛法僧寶拜起兩膝著地手執香爐燒眾名香云願此香煙雲徧滿十方界無邊佛土中無量香莊嚴具足菩薩道成就如來香冥心少頃徧運香雲供養三寶普熏眾生咸生淨土想已置爐起作一禮禮已合掌曲躬懇切想面對彌陀及一切佛而讚歎曰如來妙色身世間無與等無比不思議是故今頂禮如來色無盡智慧亦復然一切法常住是故我歸依大智大願力普度於羣生令捨熱惱身生彼清涼國我今淨三業歸依及禮讚願共諸眾生同生安樂剎讚願已即便禮佛一一存心專對云一心頂禮常寂光淨土阿彌陀如來清淨妙法身徧法界諸佛一心頂禮實報莊嚴土阿彌陀如來微塵相海身徧法界諸佛一心頂禮方便聖居土阿彌陀如來解脫相嚴身徧法界諸佛一心頂禮西方安樂土阿彌陀如來大乘根界身徧法界諸佛一心頂禮西方安樂土阿彌陀如來十方化往身徧法界諸佛一心頂禮西方安樂土教行理三經極樂正宣揚徧法界尊法靈峰大師注云此禮舊本無今依幽溪大師添入使三寶具足一心頂禮西方安樂土觀世音菩薩萬億紫金身徧法界菩薩摩訶薩一心頂禮西方安樂土大勢至菩薩無邊光智身徧法界菩薩摩訶薩一心頂禮西方安樂土清淨大海眾滿分二嚴身徧法界聖眾禮已即兩膝跪地執手爐燒香至誠而倡是言我今普為四恩三有法界眾生悉願斷除三障歸命懺悔起禮復跪執手爐云至心懺悔我弟子某甲及法界眾生從無始世來無明所覆顛倒迷惑而由六根三業習不善法廣造十惡及五無間一切眾罪無量無邊說不可盡十方諸佛常在世間法音不絕妙香充塞法味盈空放淨光明照燭一切常住妙理徧滿虗空我無始來六根內盲三業昏闇不見不聞不覺不知以是因緣長流生死經歷惡道百千萬劫永無出期經云毗盧遮那徧一切處其佛所住名常寂光是故當知一切諸法無非佛法而我不了隨無明流是則於菩提中見不清淨於解脫中而起纏縛今始覺悟今始改悔奉對諸佛彌陀世尊發露懺悔當令我與法界眾生三業六根無始所作現作當作自作教他見聞隨喜若憶不憶若識不識若疑不疑若覆若露一切重罪畢竟清淨我懺悔已六根三業淨無瑕累所修善根悉亦清淨皆悉回向莊嚴淨土普與眾生同生安養願阿彌陀佛常來護持令我善根現前增進不失淨因臨命終時身心正念視聽分明面奉彌陀與諸聖眾手執華臺接引於我一剎那頃生在佛前具菩薩道廣度眾生同成種智應三說若時促及事迫一說亦得起云懺悔發願已歸命禮阿彌陀佛及一切三寶一拜次旋遶法或三帀或七帀乃至多帀如是稱念隨意隨帀不拘遍數稱云南無阿彌陀佛南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩摩訶薩自歸於佛當願眾生體解大道發無上心拜自歸於法當願眾生深入經藏智慧如海拜自歸於僧當願眾生統理大眾一切無礙拜和南聖眾次至別座誦彌陀經或觀經若不誦得經一心稱名量時而止更迴向結撮亦得十念門者每晨服飾已面西正立合掌連聲稱阿彌陀佛盡一口氣為一念如是十氣為十念隨氣長短不限佛數氣極為度聲不高低不緩急調停得中十氣連屬令心不散專精為功名十念者是藉氣束心也作此念已發願迴向云我弟子某甲一心歸命極樂世界阿彌陀佛願以淨光照我慈誓攝我我今正念稱如來名經十念頃為菩提道求生淨土佛昔本誓若有眾生欲生我國至心信樂乃至十念若不生者不取正覺唯除五逆誹謗正法我今自憶此生已來不造逆罪不謗大乘願此十念得入如來大誓海中乘佛慈力眾罪消滅淨因增長若臨欲命終自知時至身不病苦心無貪戀心不倒散如入禪定佛及聖眾手執金臺來迎接我如一念頃生極樂國華開見佛即聞佛乘頓聞佛慧廣度眾生滿菩提願作已便止不必拜要盡此生不得一日暫廢唯將不廢自要其心得生彼國繫緣門者凡公臨私養歷涉緣務雖造次常不忘佛及憶淨土如切事繫心雖種種作務不妨密憶前事念佛亦如是若失念數數攝還久久成性任運常憶楞嚴經譬如有人一專為憶譬佛念眾生一人專忘譬眾生念佛如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念眾生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若眾生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣如此繫心任運常遮一切惡念說欲作惡憶佛之故惡不能成縱隨惡作惡業時心常不耎如身有香自然離臭又復覺心微起惡念即便憶佛以佛力故惡念自息如人遇難求彼彊援必得免脫又見他受苦以念佛心憐愍於彼願其離苦若斷刑獄以念佛故生憫念心願生淨土誓相救濟凡歷一切境界若善若惡由心憶佛皆心念作願故普賢願王云作一切惡皆不成就若作善業皆悉和合即此意爾如是相續念佛在心能辦一切淨因功德恐煩披覽不復具說誠哉此門為益最大眾福門者普賢觀國王大臣欲懺重罪當行五事一正心不謗三寶不障出家不為梵行人作惡留難於持戒四眾勿行汙染二孝養父母奉事師長三正法治國不邪枉人民四六齋日敕境內力所及處令行不殺嚴禁漁捕及誡姦鬬六齋日者白月初八四王使者巡世十四四王太子巡十五四王親巡黑月二十三二十九三十巡世準上若四王親下諸天星宿鬼神俱時隨從遇修福齋戒者諸天相慶即注祿添算護持福業令其成就五深信因果信一實道知佛不滅此與十六觀三福大同但普賢正為王臣故引用此亦是三世諸佛淨業正因若出家四眾應具依觀經三福為行隨作一福若心念若口言作意迴向方成淨因此四法門是念佛三昧往生正因必須繫日修習方可自期定生淨土經云行此三昧現得見阿彌陀佛及二菩薩若聞佛及二菩薩名除無量劫生死之罪何況憶念此是人中芬陀利華觀音勢至為其勝友當坐道場生諸佛家此人現世彼佛遣無數化佛化觀音勢至及娑婆二十五菩薩晝夜擁護行住坐臥一切時處不令惡鬼得便不受一切災難常為國王大臣一切人民之所宗奉所得功德一念之間不可算數如佛之辯不能稱揚除彼不肖人孰聞不信受終幽溪大師暮年奉行願為日課臨終趺坐以指書空作妙法蓮華經五字而化法門之妙於斯驗矣淨土十疑論隋天台智者大師說第一疑問諸佛菩薩以大悲為業祇應願生三界於五濁三塗中救苦因何求生淨土自安其生捨離眾生無大慈悲專為自利障菩提道答菩薩有二種久行菩薩道得無生忍者實當所責未得忍已還及初發心凡夫要須常不離佛忍力成就方堪處三界於惡世中救苦眾生智度論具縛凡夫有大悲心願生惡世救苦眾生無有是處何以故惡世界煩惱強無忍力隨境轉聲色所縛自墮三塗焉能救眾生假令得生人中聖道難得或因施戒修福得作國王大臣富貴自在縱遇善知識不肯信用貪迷放逸廣造眾罪乘此惡業一入三塗經無量劫從地獄出受貧賤身若不逢善知識還墮地獄如此輪迴至於今日人皆如是此名難行道也故維摩經自疾不能救而能救疾人智度論如二人各有親眷為水所溺一人情急直入水救無方便力彼此俱沒一人有方便取筏乘之悉皆得脫新發意菩薩亦復如是未得忍力不能救生為此當須近佛得無生忍已方能救生如得船者又論云嬰兒不得離母離母或墮阬井渴乳而死鳥子翅羽未成依樹傅枝不能遠去翅翮成就方能飛空自在無礙凡夫無力唯得專念阿彌陀佛使成三昧以業成故臨終斂念得生決定不疑見彌陀佛證無生忍已還來三界乘無生忍船救苦眾生廣施佛事任意自在故論云遊戲地獄行者生彼國得無生忍已還入生死教化地獄受苦眾生以是因緣求生淨土願識其教十住婆沙論名易行道也第二疑問諸法體空本來無生平等寂滅今乃捨此求彼豈不乖理經云淨土先淨其心心淨即佛土淨此云何通答釋有二義一總答二別答總答者若言求生西方彌陀淨土是捨此求彼不中理者汝執住此不求西方是捨彼著此此還成病不中理也又轉計亦不求生彼亦不求生此者則斷滅見金剛般若云汝若作是念發阿耨菩提者說諸法斷滅莫作是念發菩提心者於法不說斷滅相二別答者夫不生不滅者於生緣中諸法和合不守自性求於生體亦不可得此生生時無所從來故名不生諸法散時不守自性言我散滅此散滅時去無所至故言不滅非謂因緣生外別有不生不滅亦非不求生淨土喚作無生中論因緣所生法我說即是空亦名為假名亦名中道義又諸法不自生亦不從他生不共不無因是故知無生維摩經雖知諸佛國及與眾生空而常修淨土教化諸羣生又云造立宮室若依空地隨意無礙若依虗空終不能成諸佛說法常依二諦不壞假名而說諸法實相智者熾然求生淨土達生體不可得即真無生此謂心淨即佛土淨愚者為生所縛聞生即作生解聞無生即作無生解不知生即無生無生即生不達此理橫相是非瞋他求生淨土幾許誣哉此是謗法罪人邪見外道也第三疑問十方一切淨土法性平等功德亦等行者普念一切功德生一切淨土今偏求一佛淨土與平等性乖答一切諸佛土皆平等但眾生根鈍濁亂者多若不繫一境三昧難成專念阿彌陀佛即是一相三昧以心專至得生彼國隨願往生經普廣菩薩問十方悉有淨土何故偏讚西方佛告普廣閻浮提眾生心多濁亂偏讚一佛淨土使專心一境即得往生若總念一切佛境寬則心散漫三昧難成故不得生又求一佛功德與一切佛功德無異以同一佛法性故為此念阿彌陀佛即念一切佛生一淨土即生一切淨土華嚴經一切諸佛身即是一佛身一心一智慧力無畏亦然又云譬如淨滿月普應一切水影像雖無量本月未曾二如是無礙智成就等正覺應現一切剎佛身無有二智者以譬喻得解能達一切月影即一月影一月影即一切月影月體無二故一佛即一切佛一切佛即一佛法身無二故熾然念一佛時即是念一切佛也第四疑問十方佛土隨念一土隨得往生何偏念彌陀佛答凡夫無智不敢自專專用佛語釋迦一代說法處處聖教唯勸眾生念阿彌陀佛求生西方極樂世界如無量壽經觀經往生論數十餘部殷勤指授故偏念也又彌陀別有大悲四十八願接引眾生又觀經阿彌陀佛有八萬四千相一一相有八萬四千好一一好放八萬四千光明徧照法界念佛眾生攝取不捨若有念者機感相應決定得生又阿彌陀經大無量壽經鼓音王陀羅尼經等云釋迦佛說經時皆有十方恒沙諸佛舒舌相覆大千世界證成一切眾生念阿彌陀佛乘佛大悲本願力故決定得生極樂世界當知阿彌陀佛與此世界偏有因緣無量壽經法滅之時特駐此經百年在世接引眾生往生彼國故知阿彌陀佛與此世界極惡眾生偏有因緣其餘淨土雖一兩經略勸不如彌陀佛國處處經論殷勤勸往也第五疑問具縛凡夫惡業厚重一切煩惱一毫未斷西方淨土出過三界具縛云何得生答有二種緣一自力二他力自力者此世界修道實未得生淨土瓔珞經凡夫未識三寶不知善惡因之與果初發菩提心以信為本住在佛家以戒為本受菩薩戒身身相續戒行不闕經一二三劫至初發心住如是修行十信一波羅密等無量行願相續無間滿一萬劫至第六正心住若更增進至第七不退住即種性位此約自力卒未得生淨土他力者若信阿彌陀佛大悲願力攝取念佛眾生即能發菩提心行念佛三昧厭離三界身起行施戒修福於一一行中迴願生彼彌陀淨土乘佛願力機感相應即得往生故十住婆沙論云此世界有難行道易行道難行者五濁惡世於無量佛時求阿跋致甚難可得此難無數塵沙說不可盡略陳有五一外道相眩亂菩薩法二無賴惡人破他勝德三顛倒善果能壞梵行四聲聞自利障於大慈五唯有自力無他力持如跛人步行一日數里極大辛苦謂自力也易行者謂信佛語教念佛三昧願生淨土乘彌陀願力攝持決定往生不疑如水行藉船須臾千里謂他力也劣夫從轉輪王一日夜行四天下非自力輪王力也若言有漏凡夫不得生淨土亦可有漏凡夫不得見佛身然念佛三昧並無漏善根所起有漏凡夫隨分得見佛麤相菩薩見微細相淨土亦爾雖是無漏善根所起有漏凡夫發無上菩提心求生淨土常念佛故伏滅煩惱得生淨土隨分得見粗相菩薩見微妙相此何所疑華嚴經一切諸佛剎平等普嚴淨眾生業行異所見各不同即其義也第六疑問設令具縛凡夫得生彼國邪見三毒等常起云何生彼即得不退答彼有五因緣不退一阿彌陀佛大悲願力攝持故得不退二佛光常照故菩提心常增進不退三水鳥樹林風聲樂響皆說苦空聞者常起念佛念法念僧之心故不退四彼國純諸菩薩以為良友無惡緣境外無神鬼魔邪內無三毒等煩惱畢竟不起故不退五生彼即壽命永劫共菩薩佛齊故不退也在此惡世日月短促經阿僧祇劫復不起煩惱長時修道云何不得無生忍也此理顯然不須疑也第七疑問彌勒菩薩一生補處上品十善得生彼處見彌勒菩薩隨從下生三會之中自然而得聖果何須求生西方答求生兜率一日聞道見佛勢欲相似若細比較大有優劣且論二種一者縱持十善恐不得生彌勒上生經行眾三昧深入正定方始得生更無方便接引之義不如阿彌陀佛本願力光明力但有念佛眾生攝取不捨又釋迦說九品教門方便接引殷勤發遣生彼淨土但眾生能念彌陀佛者機感相應必得生也如世間慕人能受慕者機會相投必成其事二者兜率天宮是欲界退位者多無水鳥樹林風聲樂響使聞者悉念佛發菩提心伏滅煩惱又有女人長諸天愛著五欲之心又天女微妙諸天耽玩不能自勉不如彌陀淨土水鳥樹林風聲樂響眾生聞者皆念佛發菩提心伏滅煩惱又無女人二乘純一大乘清淨良伴為此煩惱惡業畢竟不起遂至無生之位如此比較優劣顯然釋迦佛時見佛不得聖果者如恒沙彌勒出世亦爾大有不得聖果者未如彌陀淨土生彼國已悉得無生法忍未有一人退落三界為生死業縛也西國傳有三菩薩一無著二世親三師子覺三人契志生兜率願見彌勒若先亡得見誓來相報師子覺亡一去不來後世親臨終無著語云汝見彌勒即來相報世親去已三年始來云至彼聽彌勒菩薩一坐說法旋繞即來彼天日長此處已經三年師子覺為受天樂五欲自娛在外眷屬從去已來總不見彌勒諸小菩薩生彼尚著五欲何況凡夫為此願生西方定得不退不求生兜率也第八疑問眾生無始以來造無量業今生一形不逢善知識又復無惡不造云何臨終十念成就即得往生出過三界結業之事答眾生善惡業種多少強弱並不得知但能臨終依善知識十念成者皆是宿善業強始得遇善知識成就十念若惡業多者善知識尚不可逢何論十念成就又汝以無始惡業為重臨終十念為輕者今三種較量輕重不定不在時節久近多少一在心二在緣三在決定在心者造罪時從自虗妄顛倒生念佛者從善知識聞說阿彌陀佛真實功德名號生一虗一實豈得相比如萬年闇室日光暫至而闇頓滅豈以久來之闇不肯滅耶在緣者造罪時從虗妄癡闇心緣虗妄境界顛倒生念佛心從聞佛清淨真實功德名號緣無上菩提心生一真一偽豈得相比如被毒箭箭深毒磣傷肌破骨一聞滅除藥鼓箭出毒除豈以箭深毒磣不肯出也決定者造罪時以有間心有後心也念佛時以無間心無後心遂即捨命善心猛利是以即生如十圍之索千夫不制童子揮劒須臾兩分又如千年積柴一豆火焚少時即盡又如有人一生修十善應生天臨終起一念決定邪見即墮阿鼻地獄惡業虗妄以猛利故能排一生善業令墮惡道況臨終猛心念佛真實無間善業不能排無始惡業得生淨土又云一念念佛滅八十億劫生死之罪為念佛時心猛利故伏滅惡業決定得生不須疑也古判十念成就作別時意攝論由唯發願全無有行雜集論願生安樂即得生聞無垢佛名即得菩提並是別時之因全無有行若將臨終無間十念猛利善行是別時意者幾許誤哉行者深思此理自牢其心莫信異見自墜陷也第九疑問西方去此十萬億佛剎凡夫劣弱云何可到又往生論云女人及根缺二乘種不生答為對凡夫肉眼生死心量說去此十萬億佛剎但使眾生淨土業成者臨終在定之心即淨土受生之心動念即是生淨土時為此觀經云彌陀佛國去此不遠又業力不可思議一念即得生彼不須愁遠又如人夢身在牀而心意識徧至他方一切世界如平生不異生淨土亦爾動念即至不須疑也女人根缺二乘種不生者韋提夫人是請生淨土主及五百侍女悉生彼國但此處女人及盲聾瘖啞人心念彌陀佛生彼國已更不受女身亦不受根缺身二乘人但迴心願生淨土至彼更無二乘執心故云女人及根缺二乘種不生非謂此處女人及根缺人不得生也無量壽經四十八願云設我得佛十方世界一切女人稱我名號厭惡女身捨命之後更受女身者不取正覺況生彼國更受女身根缺亦爾第十疑問決定求生西方未知作何行業以何為種子得生彼國又俗人皆有妻子不斷淫欲得生彼否答欲決定生西方者具二種行定得生彼一厭離行二欣願行厭離行者凡夫無始已來為五欲纏縛輪迴五道備受眾苦不起心厭離五欲未有出期為此常觀此身膿血屎尿一切惡露不淨臭薉涅槃經如是身城愚癡羅剎止住其中誰有智者當樂此身又經云此身眾苦所集一切皆不淨扼縛癰瘡等根本無義利至諸天身皆亦如是行者若行若坐若睡若覺常觀此身唯苦無樂深生厭離縱妻房不能頓斷漸漸生厭作七種不淨觀一觀此婬欲身從貪愛煩惱生是種子不淨二父母交會時赤白和合是受生不淨三胎中在生臟下熟臟上是住處不淨四在胎唯食母血是食噉不淨五日月滿足頭向產門膿血俱出臭薉狼籍是初生不淨六薄皮覆上其內膿血徧一切處是舉體不淨七乃至死後胮脹爛壞骨肉縱橫狐狼食噉是究竟不淨自身既爾他身亦然所愛境界男女身等深生厭離常觀不淨能如此觀者婬欲煩惱漸漸減少又十想等觀廣如經說又發願願我永離三界雜食臭薉膿血不淨耽荒五欲男女等身願得淨土法性生身此為厭離行欣願行復二種一先明求往生之意二觀彼淨土莊嚴等事欣心願求明往生意者所以求生淨土為欲救一切眾生苦即自思忖我今無力若在惡世煩惱境強自為業縛淪溺三塗動經劫數如此輪轉無始來未曾休息何時得救苦眾生為此求生淨土親近諸佛若證無生忍方能於惡世救苦眾生故往生論發菩提心者正是願作佛心願佛心則是度眾生心度生心則是攝眾生生佛國心又願生淨土須具二行一須遠離三種障菩提門法二須得三種順菩提門法何為遠離三種障菩提法一依智慧門不求自樂遠離我心貪著自身故二依慈悲門拔一切眾生苦遠離無安眾生心故三依方便門憐愍一切眾生欲與其樂遠離恭敬供養自身心故若能遠離三種菩提障則得三種順菩提法一無染清淨心不為自身求諸樂故菩提是無染清淨處若為自身求樂即染身心障菩提門故無染清淨心是順菩提門二安清淨心為眾生苦故菩提是安隱一切眾生清淨處若不作心一切眾生令離生死苦即違菩提門故安清淨心是順菩提門三樂清淨心欲令一切眾生得大菩提涅槃故菩提涅槃是畢竟常樂處若不作心令一切眾生得畢竟常樂即遮菩提門此菩提因何而得要因生淨土常不離佛得無生忍已於生死國中救苦眾生悲智內融定而常用自在無礙即菩提心此是願生之意二明欣心願求者希心起想緣彌陀佛若法身若報身等金色光明八萬四千相一一相八萬四千好一一好放八萬四千光明常照法界攝取念佛眾生又觀彼土七寶莊嚴妙樂等備如無量壽經觀經十六觀等常行念佛三昧及施戒修等一切善行悉以迴施一切眾生同生彼國決定得生此欣願門也楊傑云贊輔彌陀教觀其書山積唯智者十疑論最為首冠引聖言決羣惑萬年闇室日至頓有餘光千里水程舟具不勞自力非法藏後身不能也善導和尚專修法門善導和尚見西河綽禪師淨土九品道場喜曰此真入佛之津要修餘行業迂僻難成唯此法門速超生死於是勤篤精苦晝夜禮誦旋至京師激發四眾每入室長跪唱佛非力竭不休出則演說淨土法門三十餘年未甞睡眠護持戒品纖毫不犯好食供眾粗惡自奉所有䞋施用寫阿彌陀經十萬餘卷畫淨土變相三百壁修營塔寺然燈續明道俗從其化者甚眾有誦彌陀經十萬至五十萬遍者有日課佛名自一萬至十萬者其間得三昧生淨土者不可紀述或問念佛生淨土耶導曰如汝所念遂汝所願乃自念一聲有一光明從其口出十至於百光亦如之其勸世偈曰漸漸鷄皮鶴髮看看行步龍鍾假饒金玉滿堂豈免衰殘病苦任汝千般快樂無常終是到來唯有徑路修行但念阿彌陀佛問曰何故不令人作觀直遣專稱名號耶答眾生障重境細心粗識颺神飛觀難成就是以大聖悲憐直勸專稱名字正由稱名易故相續即生若能念念相繼畢命為期者十即十生百即百生何以故無外雜緣得正念故與佛本願相應故不違教故順佛語故若捨專念修雜業者百中希得一二千中希得三四何以故雜緣亂動失正念故與佛本願不相應故與教相違故不順佛語故繫念不相續故心不相續報佛恩故雖作業行常與名利相應故樂近雜緣自障障他往生正行故比見諸方道俗解行不同專雜有異但使專意作者十即十生修雜不至心者千中無一願一切人等善自思惟行住坐臥必須厲心克己晝夜莫廢畢命為期前念命終後念即生長時永劫受無為法樂乃至成佛豈不快哉凡人臨命終時欲得往生淨土者須先準備不得怕死常念此身多有眾苦不淨惡業種種交纏若得捨此薉身超生淨土受無量快樂見佛聞法離苦解脫乃是稱意之事如脫臭敝之衣得換珍御之服放下身心莫生貪著纔有病患莫論輕重便念無常一心待死須囑家人及問候人凡來我前但為我念佛不得說眼前閑雜之話家中長短之事亦不須輭語安慰祝願安樂此皆虗華無益之語若病重將終親屬不得垂淚哭泣及發嗟歎懊惱之聲惑亂心神失其正念但一時同聲念佛助其往生若得明曉淨土之人頻來策勵極為大幸若依此者決定往生無疑也多見世人平時念佛發願求生甚是勤拳及至臨病却又怕死都不說著往生之事死門事大須自家著力始得若一念差錯歷劫受苦誰人相代思之思之法照大師感見文殊法照大師與同志數人遠詣五臺至佛光寺遙見異光照身即之行五十里見二童子自稱善財難陀引至一寺牓曰大聖竹林寺金地寶樹以為莊嚴入寺登講堂見文殊在西普賢在東各據師子座萬眾圍繞而為說法照作禮問曰末法凡夫去聖時遙知識隘劣障垢尤深佛性無由顯現佛法浩瀚未審修何法門最為其要文殊告曰汝今念佛今正是時諸修行門無過念佛供養三寶福慧雙修此之二門最為徑要所以者何我於過去劫中因觀佛故因念佛故因供養故得一切種智是故一切諸法般若波羅蜜甚深禪定乃至諸佛皆從念佛而生故知念佛諸法之王照又問當云何念文殊言此世界西有阿彌陀佛彼佛願力不可思議汝當繼念令無間斷命終決定往生永不退轉語已二大聖同舒金臂摩照頂曰汝以念佛故不久證無上正等菩提若善男女等願疾成佛者無過念佛則能速證無上菩提慧日法師感見觀音慧日法師詣西域求法泛泊渡海經三年得達天竺禮如來聖跡尋求梵本日既閱歷艱苦深厭閻浮思何國何方有樂無苦何法何行能速見佛徧問天竺三藏皆勸修淨土法門日聞已頂受漸至北印度健䭾羅國王城東北有大山山有觀世音像有至誠祈請者每見大士現身日至山叩頭七日又斷食畢命為期至七日夜觀音於空中現紫金身長一丈餘坐寶蓮華垂右手摩日頂曰汝欲傳法自利利他唯念西方極樂世界阿彌陀佛發願往生到彼國已見佛及我得大利益汝當知淨土法門勝過諸行飛錫法師高聲念佛問方等經修無上深妙禪定令繼想白毫兼稱佛號以祈勝定然默念泉澄三昧自至何必聲喧里巷響震山林然後為道哉對聲亦無爽夫辟散之要要存於聲聲之不厲心竊無定有五義焉茅連茹乘䇿其後畢命一對長謝百憂一也聲光所及萬禍冰消功德叢林千山松茂二也金容熒煌以散彩寶華淅瀝而雨空若指諸掌皆聲致焉三也如牽木石重而不前洪音發號飄然輕舉四也與魔軍戰旗鼓相望用聲律於戎軒以定破於強敵五也喧靜兩全止觀雙運叶夫佛意不亦可乎念佛三昧序云功高易進念佛為先夫玄音之扣塵累每銷滯情融朗非天下之至妙其孰能與於此華嚴經𡩋受無量苦得聞佛音聲不受一切樂而不聞佛名然則佛聲遠震開善萌芽猶春雷之動百草安得輕誣哉又問一念十念往生淨土何者為正對一念往生住不退地此為正也如佛說謗佛毀經打僧罵尊五逆四重皆一念惡業成墮無間獄如箭射今念佛生淨土亦一念善業成登極樂土如臂屈前一念五陰滅後一念五陰生如蠟印印泥印壞文成不須兩念愛酪沙彌生一念愛心後生酪中作蟲大薩婆長者妻坐對明鏡自愛其身海風破船生故屍中作蟲斯皆一念也大無量壽經明一念念佛皆得往生觀經十念為遘疾尫羸力微心劣故十稱以助其一念若心盛不昧一念生焉猶植絲髮其茂百圍也永明壽禪師誡勿輕淨土問曰但見性悟道便超生死何用繫念彼佛求生他方答真修行人應自審察如人飲水冷暖自知今存龜鑑以破多惑諸仁者當觀自己行解見性悟道受如來記紹祖師位能如馬鳴龍樹否得無礙辯才證法華三昧能如天台智者否宗說皆通行解兼修能如忠國師否此諸大士皆明垂言教深勸往生葢是自利利他豈肯悞人自悞況大雄讚歎金口叮嚀希從昔賢恭稟佛敕定不謬悞也如往生傳所載古今高士事迹顯著非一宜勤觀覧以自照知又當自度臨終之時生死去住定得自在否自無始來惡業重障定不現前否此報身定脫輪迴否三塗惡道異類中行出沒自由定無苦惱否天上人間十方世界隨意寄託定無滯礙否若也了了自信得及何善如之若其未也莫以一時貢高卻致永劫沉淪自失善利將復尤誰嗚呼哀哉何嗟及矣四料揀一曰有禪無淨土十人九錯路陰境若現前瞥爾隨他去二曰無禪有淨土萬修萬人去但得見彌陀何愁不開悟三曰有禪有淨土猶如帶角虎現世為人師來生作佛祖四曰無禪無淨土鐵床并銅柱萬劫與千生沒箇人依怙四明尊者勸念佛疏文原夫一念本融諸法無礙遇熏既異感報成差是以順性而修則顯諸佛淨土隨情而作則循五趣苦輪所以處娑婆者升出尤難墮落者眾經云得人身者如爪上土失人身者如大地土直待三乘行備方免四趣受生葢境界粗強煩惱熾盛自力求脫實難其人若夫生安養者國土莊嚴身心清淨直至成佛不墮三塗經云尚無惡道之名何況有實又云眾生生者皆是阿䟦致若欲生彼但當稱彼佛號修彼佛慈必為彼佛本願攝取捨此報身定生彼國具如經說實非臆談今結萬人以為一社心心繫念日日要期每歲仲春同集一處同修供養同聽法音會彼萬心以為一志俾成淨業誓取往生況劫濁命光其猶風燭一息不至三塗現前何得自寬不思來報當依佛語無順人情頓息攀緣唯勤念佛慈照宗主勸人發願偈萬法從心生萬法從心滅我佛大沙門常作如是說持戒無信願不得生淨土唯得人天福福盡受輪迴輾轉難脫離看經無慧眼不識佛深意後世得聰明亂心難出離發願持戒力回向生樂國如是各行持千中不失一釋迦金口說彌陀親攝受諸佛皆護念諸天善護持見此念佛人與佛不相遠應當坐道場轉於大法輪普度無邊眾譬如貪家女腹孕轉輪王諸天常愛護貧女自不知腹中有貴子今此念佛人其意亦如是憶佛常念佛不久當成佛諸佛善護持其人自不知我當生淨土卻要來後世再得生人中譬如貧人家地內有伏藏藏神常守護不令其有失貧人自不知家內有寶藏逐日趁客作求衣食自濟今此念佛人其意亦如是不知念佛人具足如來藏自說我無分反要生人中譬如病人家自有真妙藥不知妙藥性不能自治病每日床枕邊痛苦受無量今此念佛人其意亦如是不知念佛心能滅貪嗔癡能為大醫王能為大寶藏利濟一切人能為大法王覆護一切眾將為是凡夫不得生淨土且自持齋戒後世願為人輾轉更修行方可生彼國多見修行人常作如是說不稱彌陀願不合淨土經邪見障覆心畢竟難出離非是他人障皆是自障心今世不得生一蹉成百蹉勸汝修行人信我如來說佛無不實語豈是虗誑言但當自精勤一心求淨土因風吹於火用力不消多幸有念佛心回願超三界逢寶不取寶遇食苦長飢咄哉大丈夫不見真實意我今略勸讚輾轉傳與人代我廣流通作於如來使真是諸佛子真名報佛恩普願如說行同生極樂國優曇和尚蓮宗寶鑑凡修念佛之人欲生淨土每念世間一切無常成必有壞生必有死若不親聞佛法則捨身受身輪轉三界四生六道無解脫期我今有緣得聞正法得修淨業唯佛為念捨此報身當生淨土入彼蓮胎受諸快樂永脫生死不退菩提此乃大丈夫平生之能事也纔有疾病正要向前坦蕩身心莫生疑慮直須西向正坐專想阿彌陀佛與觀世音大勢至菩薩及無數化佛現在其前一心稱念南無阿彌陀佛聲聲不絕於諸世間一切事務不得思念不得貪戀若或心念起來但要急稱佛號於念念中除滅罪障若病人昏困不能自然則看病人當方便警䇿勸而諭之如此用心助令命盡只此一念決定往生淨土命若未盡自得安𡩋慎勿妄起留戀世間之心當存自存當死須死但辨往生何須疑慮若解此理如脫敝服以著上衣一捨凡身便登佛地奇哉偉哉至矣盡矣真信修行之人端的是要生西方極樂世界專意一念持一句阿彌陀佛只此一念是我本師只此一念即是化佛只此一念是破地獄之猛將只此一念是斬羣邪之寶劍只此一念是開黑闇之明燈只此一念是度苦海之大船只此一念是脫生死之良方只此一念是出三界之徑路只此一念是本性彌陀只此一念達惟心淨土但只要記得這一句阿彌陀佛在念莫教失落念念常現前念念不離心無事也如是念有事也如是念安樂也如是念病苦也如是念生也如是念死也如是念如是一念分明不昧又何必問人覔歸程乎天如禪師淨土或問問同居淨土其類甚多今指極樂又偏讚其境勝緣勝何耶答正為境緣故偏指也經云彼國無眾苦但受諸樂今以娑婆對比之此血肉形軀有生皆苦彼蓮華化生無生苦也此時序代謝衰老日侵彼寒暑不遷無老苦也此四大難調多生病患彼化體微妙無病苦也此七十者稀無常迅速彼壽命無量無死苦也此親情愛戀有愛必離彼無父母妻子無愛別離苦也此仇敵怨讐有冤必會彼上善聚會無冤憎會苦也此困苦饑寒貪求不足彼衣食珍寶皆受現成此醜薉形骸根多缺陋彼端嚴相貌皆有光明此輪轉生死彼永證無生此有四趣苦彼無三惡名此邱陵阬坎荊棘為林土石諸山薉惡充滿彼黃金為地寶樹參天樓聳七珍花敷四色此雙林已滅龍華未來彼無量壽尊現在說法此觀音勢至徒仰嘉名彼無邊上人親為勝友此羣魔外道惱亂正行彼佛化一統魔外絕蹤此媚色妖婬迷惑行者彼正報清淨實無女人此惡獸魑魅交扇邪聲彼水鳥樹林咸宣妙法二土較量境緣迥別而樂之勝未易悉舉也境勝可攝眾生取淨之情緣勝可助生者修行之力圓三不退由此階焉較餘淨居升沉之異矣問五濁惡世人皆有罪縱未造五逆其餘罪業孰能無之苟未懺悔消滅臨終念佛能往生乎答亦得生也此全藉彌陀不思議之大願力也那先經百枚大石置船上藉船力石不沒水若無船小石亦沒船喻佛力石喻惡業故有帶業往生之說具惑染者得生同居淨也僧雄俊并汾州人屠牛為業臨終見羣牛逼髑苦痛切已張鍾馗殺雞為業臨終見神人驅羣雞破兩目流血盈牀稱佛名號俱生淨土此非佛力而何復以喻明如人犯法應入官囚投託國王承王宣召官不能拘復達帝京西資鈔云得生淨土是假他力彌陀願攝釋迦勸贊諸佛護念如渡大海既得巨舟仍有良導加以便風必速到彼岸也若不肯登舟遲留惡國誰之過歟問人心易進易退一聞警䇿勇猛精勤忽逢障難便轉念頭都道淨業是身後事目前無所利濟亦無怪其然耶答汝見未廣也受持佛名獲十勝利一晝夜一切諸天大力神將河沙眷屬隱形守護二二十五大菩薩如觀世音等及一切菩薩常隨守護三諸佛晝夜護念彌陀常放光明攝受四一切惡鬼不能害毒蛇毒龍毒藥悉不能中五火水冤賊刀箭牢獄枷鎖橫死悉皆不受六先業消滅冤命解脫更無執對七夜夢正直或見彌陀勝妙色像八心常歡喜顏色光澤氣力充盛所作吉利九常為一切世間人民恭敬供養歡喜禮拜如敬佛十命終無怖畏正念現前得見彌陀聖眾持金蓮華接引往生盡未來際受勝妙樂如上十利經文具載佛口所宣現生來世皆有利益但當精進不用懷疑問圓觀之修唯心之念似上器之行門華嚴十願寶積十心亦大根之功用根器不對功行難成今吾自揣觀吾自好唯專持名號加禮拜懺悔而已師為如何答善哉汝知量矣汝合善導專修無間之說矣無間修者身專禮阿彌陀佛口專稱阿彌陀佛意專想阿彌陀佛善導和尚天竺傳稱為彌陀化身今觀其說要緊在念念相續永明云直須一心歸命盡報精修坐臥之間常面西向當行道禮敬之際念佛發願之時懇苦翹誠無諸異念如就刑戮若在狴牢怨賊所追水火所逼一心求救願脫苦輪速證無生廣度含識紹隆三寶誓報四恩如斯至誠方不虗棄如或言行不稱信願輕微無念念相續之心有數數間斷之意恃其懈怠臨終望生但為業障所遮恐難值其善友風火逼迫正念不成何以故如今是因臨終是果應須因實果則不虗聲和則響順形直則影端也問儻世事不容撥棄何以教之答若是痛念無常用心真切者一任公私幹辦八面應酧與他念佛兩不相妨不見道朝也阿彌陀暮也阿彌陀假饒忙似箭不離阿彌陀又云竹密不妨流水過山高豈礙白雲飛又冗極頃刻無閑者每日早晨必須十念積久功成亦不虗棄此先德垂訓切要之方當遵行之寶王三昧念佛直指四明妙叶禪師撰夫淨薉同心生佛一理諸法本等奚假勸修其奈迷心作境淨薉斯分對待相成縛脫迥異纏縛多劫不易覺知故須勤勸苦海眾生求生極樂世界行人既深知淨薉苦樂真實不謬便當如農趨利止之不得然農為一歲饑寒日夜不休經年不倦行者超歷劫之苦何止一歲饑寒登九品之安何止一年溫飽折攝二門如金玉砂石雖三尺孺子必棄石求金不勸自取此土苦彼土樂此生死沉溺彼自在解脫亦皆孺子所能辨者亦必捨薉求淨如救頭然聞教便行奚待更勸苦樂二土是佛所說諦信不疑修則自得今人見𦳊則搐鼻攢眉嫌其臭薉欲速去見錦綺則舒顏展笑貪其瑩潔欲速得暫時美惡幻境尚不能一忍而憎愛熾然長劫極樂極苦而不速生忻厭愚之甚惑之深矣又此界釋迦已滅彌勒未生賢聖隱伏眾生奔波苦海猶失父之兒若不以極樂願王為歸誰為救護神仙未離空地尚不易至三品十善之因生三界天自劣至優各歷多劫尤難如願成小敗廣如海如滴中間或遇邪惡魔黨永退永失敢言得出三界望四果四向況歷信住行向諸地而超此耶若修念佛法門凡地不出一生橫截三界五道蒙佛接引得生安養華開見佛聞法悟道不離當念闊步大方供養一切三寶教化一切眾生彌勒生時再來此地所有歷劫父母妻子兄弟姉妹冤親等境諭以道品告以昔因皆令證果則其行願豈不廣大耶如是功德一念失修便屬後世豈宜自緩況世事千端連環不斷心則念念不住身則在在無休役我升沉障我本性歷劫至今曾未休息無常遷變不可久留縱壽百年不逾彈指今日明日難保其存忽然眼光落地不覺剎那異生隨其業因受形別類披毛戴角著地飛空今日見解都忘恍惚三途六趣飄零多劫不自知歸縱彌勒出生而我生處何定尚不聞父母三寶名字況經教圓談雖受異身保惜深重因業致業從冥入冥懼死貪生不異今日若非即於當念之間效彼先覺丈夫猛發大心立決定志奮揚舉鼎山之力一截截斷安能行業昭著光動人天羣有蒙恩諸佛護念閉三惡趣開總持門不待娑婆報滿便得往生者也若待處所穩便衣食豐饒充足香華事事稱意思前算後卜彼良時報盡恩冤圓成善事然後發行虗空界窮無此日矣精進者不為世間八風所退不為身心異見大小病緣而怠其行也行人欲入三昧於中或被一切強輭二魔內外惑亂當堅強其志重加精進如金剛幢不可摧毀如須彌盧不可搖動如大海眾毒莫壞假使佛云汝不得生即當答言我先受釋迦佛記一切眾生皆當發願願生彼國尚不間於十惡五逆我不造五逆數過十念必當得生佛豈自誑肯違本願況十方諸佛示廣長舌證明斯事故必求生不退轉也是為行人金剛延幢勇健之力佛記尚不退其初志況天魔惡黨水火盜賊強邪境界及妻妾情愛而能動我行願哉或曰世人修而不得生何耶答見異而行不莊也然則虗喪其功耶答亦必承彌陀願力今世不生二世必生二世不生三世必生一念歸向當來定得往生是名皆不退轉但枉受多劫輪迴之苦故須一生取決豈可自二其志墮在他世往生者乎又有慈雲十念法門每晨盥漱靜處面西修行此往生初因必不可失或曰如何用心得不散亂答能運身口之念毋論其散但不間斷自能一心亦可即名一心惟行之不休為度固不必憂散亂矣如母喪愛子龍失命珠不期心一而自一豈制之令一也心不可制實在行人勤怠耳念佛三昧名一行者世出世間諸助道行悉為淨土而修無別岐路如眾流入海同得海名萬善同歸得名一行是故一切念處正勤根力覺道四弘六度皆淨土行乃至彈指之善及散心念佛一稱名一舉手禮誦瞻仰一香一水一華一燈一供養具或一念至十念或一施一戒一忍禪定智慧一切善相回向極樂願力持故雖有遲疾皆得往生如滴水寄海雖經多劫不壞不失不異不竭以小善根回向極樂雖經異生善根不失亦不壞竭惟除外道種性及因心未起善行未立身心未屈先期感應者不可同語也是故三昧解脫行願總持無量法門惟念佛一門圓攝無外悉皆具足如大海吞納眾流性無增減如如意珠滿一切願體無虧損故又名為三昧寶王世尊以此三昧徧告眾會大根之士若文殊等三乘八部無不傾心法流東土廬山闡揚天下之望咸美其教自佛至今聖賢之人高僧巨儒或自行而勸人或著文而作誓重法如寶輕身若塵挺身立行力修此道者列宿塵沙莫況其多也信不決人尚生邊地況正行者哉縱欲別修道品但假自力有退轉著魔之患此仗佛力修則必成無復魔業永不退轉又此三昧非但遠魔一切縣官口舌是非患難水火盜賊惡人凶事乃至虎狼蟲獸鬼魅妖精不吉祥事不能侵害亦不為一切疫痢傷寒癰疥下賤眼耳鼻舌諸病所惱願行無虧皆能排遣惟名聞利養甜愛軟賊及嗔心嗔火雖有佛力不能救焉行人當深加精進以攘卻之一念因循必為所奪然軟魔但害淺信貪怠失念之人其精進者如剛火得水反堅焉敢小近而睥睨也此身天人護助臨終正念往生天樂盈空異香滿室光明照體寶座現前彌陀臂迎菩薩手接預知時至正念不謬諸障忽空沐浴加趺會眾說法叉手告別或更勉人進道書偈擲筆合掌而逝臨終之後舉體如生齒骨數珠燒之不壞光𦦨異常五色鮮明祥物於空盤旋不散煙所至處舍利流珠此耳目所常有者也非平日履踐明白精進力感焉能若是嗟今之人修而無效葢信根淺薄因地不真未曾立行先欲人知內則自衿外欲顯曜使人恭敬冀有所得甚至妄言得覩淨境或見小境及夢中善相未識是非先欲明說此等卑下必為魔惑願行退失墮生死趣可不慎哉雖有道場儀式或被人知葢不得已豈可特露其迹使觀行傾敗哉還當審諦密實自行內懷慚愧勿露其德中有宿障欲滅微見好相如不蘊德聞人之耳其行必覆遠公三覩聖相平日未嘗言也但除臨終時耳至禱至禱又此三昧體性雖圓宜盡微細條章革諸猥弊乃至小罪猶懷大懼解隨大乘行依小學乃能合此三昧小不自小小隨解圓圓不離小小即是大小大解行一理無分即超世見經云孝養父母奉事師長慈心不殺修十善業受持三歸具足眾戒不犯威儀發菩提心深信因果不謗大乘勸進行者上每句是一法行古人各有法訓一章又復當護人心勿使誇嫌動用自若誦大乘經解第一義親近善友請問先覺不執己見不引己長志存忍辱行當依經聽聞正法不毀僧尼息世雜善不貪名利遠離邪惡處事必忠將過歸己深誡綺語一心不亂視人如佛捐棄伎能惟求往生身必清淨如是等無量善行悉宜修習能助正道更能割世染心於憎愛境無諸留難凝心如一必生淨土其功甚大不可盡述密修斯行高而不名得生彼者何知其幾彼有名傳記之人如大海之滴耳人依教誡尚能利益無量冤業眾生況父母師長法門眷屬兄弟姉妹及平日解我患難提挈我者不得其利但修此行恩無不報阿彌陀佛及二大士境界甚深於苦海中難得親近難得憶念能憶念者必解脫故經云但聞佛名二菩薩名除無量劫生死之罪何況憶念此是人中芬陀利華觀音勢至為其勝友當坐道場生諸佛家是故十方如來示大舌輪殷勤勸勵娑婆教主告誡叮嚀其辭激切五濁眾生必修此道乃得度世葢彼五濁身心俱苦以苦為命猶水火聚而佛特於苦處行悲最深世尊自成正覺至入涅槃其音不二有識之流須銘肌骨彌陀願力代不乏人聖倡之前賢繼於後廓然徧十方三世霈然充六道四生天神嚮化鬼物順之載諸行事具諸典章盈溢乎海藏龍宮徧布乎人間天上皆我彌陀願力致然也佛言最後惡世我法滅時惟此教典多留百年以度羣有然則此法豈非我等殿後之至訓也飛禽八八墮在愚癡隨人稱名蓮生舌上可以人而不如鳥乎余生末世後五百歲人根淺薄疑惑不信異見邪解各執不同正行之人多被惑亂傷感盈懷是故集我禪教淨土諸文取其極深至要之義述作此說類以成編流布世間斥邪顯正普願法界眾生於此說中一見開解了悟真心知彌陀依正還在西方達西方依正不離本性但含識者皆悉深階更願先覺不悋慈悲見未悟人如法教導前人若昧隨根應病剖析幽微更為宣說彼若一念信解行願必成往生可期功莫稱述縱異執牢固信樂不深一句染神亦成緣種展轉利益無盡無窮若能不師於心不欺不妄隨此正教誨人不倦者縱自不行即為己行縱自未學即為己學何以故法界一相無自他故昔有人二次傾己有建會勸人念佛命終往生其事昭著能發慈悲之心示攝受之相及能利彼勸人念者所得宏多法王所使但不可執謂定不必自修耳法門如海豈能盡言聊記所聞為世勸發極樂世界最清淨莊嚴微妙超世間彌陀願力同虗空相好光明亦如是念念不離眾生界普度我等生其我等自甘生死中歷劫沉淪莫超越彼佛垂臂待已久咨嗟彈指誠殷勤光明欲發蓮華開今正是時願生彼身欲無常時欲過眾苦交煎應當離願速念佛同修行盡此報身生極樂西齋淨土詩四明楚石禪師著我佛真身不可量大人陪從有輝光食時並是天肴饍行處無非聖道場庭下碧流微吐韻殿前瑤草細吹香十方一等莊嚴剎終說西方出異方每為娑婆苦所縈唯聞淨上不求生天人皆是大乘器草木亦稱三寶名處處園林如繡出重重樓閣似生成諸賢莫怪歸來晚見說芙蕖始發榮卻望金蓮寶界遙樓臺一一倚雲霄黃鶯韻美春長在玉樹枝柔歲不凋流水有聲隨岸轉好花無數逐風飄野人自選歸來日何待諸賢折簡招紙畫木雕泥塑成現成真佛甚分明歸依不是他家事福德還從自己生萬樹花開因地暖千江月現為波清朝參暮禮常如此在處皆通極樂城池上蕅花花上人佛光來照紫金身更聞妙法除心垢盡救迷情出苦輪舉步徧遊塵點國利生終滿涅槃因娑婆界上光陰短極樂知經幾劫春一箇浮泡夢幻身如何只是縱貪瞋好尋徑直修行路休學愚癡放逸人護戒還同冰雪淨操心要與聖賢親明明指出西飛日有識還令達本真遙指家鄉落日邊一條歸路直如弦空中韻奏般般樂水上花開朵朵蓮雜樹枝莖成百寶羣居服食勝諸天吾師有願當垂接不枉翹勤三十年一朵蓮含一聖胎一生功就一花開稱身瓔珞隨心現盈器酥酡逐念來金殿有光吞日月玉樓無地著塵埃法王為我談真諦直得虗空笑滿腮曾於淨土結因緣二六時中現在前每到黃昏增善念遙隨白日下長天如來寶手親摩頂大士金軀擬拍肩不借胞胎成幻質吾家自有玉池蓮濁惡眾生也可憐菩提道果幾時圓總云國土隨心淨爭奈形神被業牽正劍揮來藤落樹迷雲散盡日流天虗空畢竟無遮障淨土滔滔在目前將參法會禮金仙漸逐香風出寶蓮紅肉髻光流不盡紫金身相照無邊重重樹網垂平地一一花臺接遠天諸佛界中希有事了如明鏡現吾前麤境現前猶未識法身向上幾曾知可憐轉腦回頭處錯認拈香擇火時口耳相傳六箇字聖凡不隔一條絲堂堂日用天真佛火急回光也是遲一寸光陰一寸金勸君念佛早回心直饒鳳閣龍樓貴難免雞皮鶴髮侵鼎內香煙初未散空中法駕已遙臨塵塵剎剎雖清淨獨有彌陀願力深咫尺金容白玉毫單稱名號豈徒勞晨持萬遍烏輪上夜課千聲兔魄高歲閱炎涼終不倦天真父子會相遭如何說得娑婆苦苦事紛紛等蝟毛娑婆苦海汎慈舟此岸能超彼岸不直指迷源須念佛橫波徑度免隨流千生萬劫長安泰五趣三塗盡罷休縱使身沾下下品也勝豪貴王閻浮人生百歲七旬稀往事回觀盡覺非每哭同流何處去閑拋淨土不思歸香雲瑪瑙階前結靈鳥珊瑚樹裏飛從證法身無病惱況餐禪悅永忘饑說著無常事事輕饑餐渴飲懶經營一心不退思安養萬善同修憶永明淨洗念珠重換線堅持佛號莫停聲忘緣盡逐空花落閑向風前月下行一自飄蓬贍部南倚樓長歎月纖纖遙知法會諸天繞正想華臺百寶嚴此界猶如魚少水微生只似燕巢檐同居善友應懷我已築浮圖欠合尖少年頃刻老還衰須信無常日夜催九十六家邪智慧百千萬劫受輪迴不存寶界花池想爭得刀山劍樹摧但自淨心生願樂此中賢聖許追陪勞生能有幾光陰健只須臾病又侵常恐浮雲蔽西日須營淨舍學東林可憐世上愚癡輩不及花間智慧禽寶樹亦能談妙法何妨坐聽罷參尋須摩提國讚無窮不與他方佛境同百味酸甜長滿鉢一身輕健任遊空初心便獲無生忍具縛能教宿命通古往今來留傳記盡塵沙界扇真風水若溫清月始臨金容佛影現吾心春風不易回枯木磁石應難受曲鍼未得往生緣障重必期成就用功深譬如九轉丹砂力一點能令鐵化金念佛功深罪自除身歸極樂國中居叢林草木璚瑤接大地山河錦繡舒香界來從移步後寶蓮結自放華初玉毫炳煥黃金面天上人間總不如朝朝暮暮道心中歲歲年年佛事同一往進修安樂界六時朝禮法王宮方袍不厭香煙黑坐具何妨手汗紅如此出家今有幾灼然認得主人公蓮宮只在舍西頭易往無人著意修三聖共成悲願海一身孤倚夕陽樓秋階易落梧桐葉夜壑難藏舴艋舟幸有玉池鳬鴈在相呼相喚去來休千經萬論不虗標共指西方路一條念念刮磨心垢淨時時防護道芽焦棲蓮靜覺身安穩得果轟傳地動搖謾費工夫推甲子娑婆大劫只崇朝近有人從淨土來池心一朵玉蓮開正當蕚上標名字已向身前結聖胎極樂逍遙長不死閻浮偪迫最堪哀法王特地垂慈愍同坐黃金百尺臺吾身念佛又修禪自喜方袍頂相圓曾向多生修福果始依九品結香緣名書某甲深花裏夢在長庚落月邊濁惡凡夫清淨佛雙珠黑白共絲穿念極心開見佛時自然身到碧蓮池火輪罪淨千千劫瓊樹光分萬萬枝善友深談終不厭靈禽妙語實難思功成果滿須臾事尚謂奔流閃電遲無邊大士與聲聞海眾何妨逐品分一會聖賢長在定十方來去總乘雲談玄樹上摩尼水念佛林間共命羣坐臥經行無礙天花隨處落繽紛天人莫不證神通一一黃金色相同散眾妙花為佛事盡塵沙界起香風身光觸體成柔軟樂具流音說苦空卻倚雕欄望寶樹無邊佛國在其中佛袈裟下失人身重得人身有幾人萬行不如修白業一心何苦戀紅塵法王立誓丘山重迷子思歸涕淚頻若解返觀觀自性明珠百八總家珍西望紅霞白日輪仰觀寶座紫金身一方土淨方方淨十念心真念念真生極樂城終不退盡虗空界了無塵向來苦海浮還沒何幸今為彼岸人娑婆生者極愚癡眾苦縈纏不解思在世更無清淨業臨終那有出離時百千經裏尋常勸萬億人中一二知珍重大仙金色臂早來𢹂我入華池靈峰大師贊曰稽首楚石大導師即是阿彌陀正覺以茲微妙勝伽陀令我讀誦當參學一讀二讀塵念消三讀四讀染情薄讀至十百千萬遍此身已向蓮花託亦願後來讀誦者同予畢竟生極樂還攝無邊念佛人永破事理分張惡同居淨故四俱淨圓融直捷超方略幽溪法師淨土法語嗣法門人正知較夫修行法門如來對證之良藥也藥隨病廣數逾恒沙求其至捷徑最簡要者莫如念佛求生淨土可謂疾成覺道之秘訣也葢出離生死仗三種力一自力二他力三本有功德力若惟務悟明心地裂無明網出愛欲河或佛作祖謂之自力是為沒量好漢真大丈夫佛世及正法中諸大菩薩聲聞及諸大祖師是其人也像末之世根器謭劣有雖修而不悟悟而不精內照似脫對境仍迷縱使不迷猶然坏器菩薩有隔陰之昏初果有入胎之昧方之博地安免隨流此自力之無功出塵之不効一錯百錯實可寒心是以諸佛菩薩曲垂方便有仗他之法門焉此之法門經論亦夥求其苦口叮嚀極言稱歎列祖宏通人心崇奉惟極樂世界念佛一門為究竟言言闡淨土之惟心句句演彌陀之本性悟此者達生心與佛心平等心土與佛土無差修此者獲妙觀與妙境相符自力與他力兼濟況本有功德之力無始性具者因此全彰曠劫積累者藉之頓發故得娑婆報滿淨土現前蓮華化生不迷生陰一入永入更不退轉故生者皆是阿䟦致其數甚多比在娑婆入道塵境麤強險難惡途無處不有者固不侔矣然而說之匪難行之為難行之匪難心要為難此昔人所誡我輩當遵楊次公云愛不重不生娑婆念不一不生極樂夫念佛以一其心懇切持名專志不亂尚矣然或忘而不能念念而不能一無他情愛之所牽也夫輕愛以袪其妄斬斷情根脫離愛網尚矣然或念而不能忘忘而不能盡無他心之不能一也娑婆有一愛之不輕則臨終為此愛所牽矧多愛乎極樂有一念之不一則臨終為此念所轉矧多念乎夫愛有輕焉重焉厚焉薄焉正報焉依報焉歷舉其目則父母妻子昆弟朋友功名富貴文章詩賦道術技藝衣服飲食屋室田園林泉花卉珍寶玩物不可枚盡大而重於泰山小而輕於鴻毛有一物之不忘愛也有一念之不遺愛也有一愛存於懷則念不一有一念不歸於一則不得生嗚呼愛不重不生娑婆念不一不生極樂此兩語刮瞖眼之金錍治膏肓之聖藥凡有志於求生極樂者宜書於屋壁銘於肌膚時時莊誦念念提撕於娑婆之愛日求其輕極樂之念日求其一輕之又輕之以漸階乎無一之又一之以漸鄰乎極果能如此雖未脫薉那不是娑婆之久客未生寶所已是極樂之嘉賓臨終正念現前往生極樂必矣或問輕愛有道乎曰輕愛莫要乎一念一念有道乎曰一念莫要乎輕愛或者筦爾謂曰師言首鼠兩端俾學者何從曰非兩瑞也欲明一念之所以也葢念不一由散心異緣使然散心異緣由逐境紛馳使然娑婆有一境則眾生有一心眾生有一心則娑婆有一境聚緣內搖趣外奔逸心境交馳愛若塵沙故欲輕其愛者莫若杜其境眾境皆空萬緣都寂萬緣都寂一念自成一念若成則愛緣俱盡矣故曰欲一其念莫若輕其愛欲輕其愛莫若一其念愛之與念勢不兩立若明暗之相背也曰杜境有道乎曰余所謂杜境者非屏除萬有也亦非閉目不觀也即境以了其虗會本以空其末也萬法本自不有有之者情故情在物在情空物空萬法空而本性現本性現而情念息自然而然非加勉強楞嚴所謂見與見緣并所想相如虗空花本無所有此見及緣元是菩提妙淨明體云何於中有是非是是以欲杜其境莫若體物虗體物虗則情自絕情絕則愛不生而惟心現念一成故圓覺云知幻即離不作方便離幻即覺亦非漸次一去一留不容轉側功效之速有若桴鼓學道之士於此宜盡心焉又曰輕愛與一念同乎異乎對曰能輕娑婆之愛未必能一極樂之念能一極樂之念必能輕娑婆之愛此約無志有志間說也實則愛非念一不忘念非忘愛不一兩者工夫初無間然又曰輕愛既聞命矣一念奈何對曰一念之道有三曰信曰行曰願不疑謂之信苟有疑焉心不得一矣是以求生極樂以敦信為始必須徧讀大乘廣學祖教凡是發明淨土之書皆須一一參求悟極樂原是我惟心之淨土不是他土了彌陀原是我本性之真佛非是他佛大要有二悟妙有徧周徧具以為欣淨之本悟真空圓離圓脫以為捨薉之原第二修行者敦信如目視修行如足行信而不行猶有目無足行而不信猶有足無目是故信解既備應當念佛修行如目足兼備能到涼池行門有二一正二助正行復二一稱名二觀想稱名如小本彌陀經七日持名一心不亂有事一心理一心若口稱佛名繫心在緣聲聲相續心心不亂說心緣外境攝之令還此須生決定心斷後際念撥棄世事放下緣心使念心漸漸增長從漸至久自少至多一日二日乃至七日畢竟要成一心不亂而後已此事一心也苟得此已則極樂之淨因成就垂終之正念必然身無病苦不受惡纏預知時至身心歡喜吉祥而逝坐脫立亡親見彌陀垂光接引得生淨土必矣理一心亦無他但於事一心中念念了達能念之心所念之佛三際平等十方互融非空非有非自非他無去無來不生不滅現前一念之心便是未來淨土之際念而不念無念而念無生而生生而無生於無可念中熾然而念於無生中熾然求生是為事一心中明理一心也二觀想者具如觀無量壽佛經境有十六觀佛最要當觀阿彌陀佛丈六之身作紫磨黃金色像立華池上作垂手接引狀身有三十二種大人相相有八十種隨形好作此想者亦有事理事則以心繫佛以佛繫心初觀足下安平如奩底次觀具千輻輪相如是次第逆緣至頂中肉髻復從肉髻順緣至足底了了分明無分散意理一心者經云諸佛如來是法界身入一切眾生心想中是故心想佛時是心即是三十二相八十種好是心作佛是心是佛諸佛正徧知海從心想生是故汝等應當繫念彼佛此義具明微妙三觀如觀經疏妙宗鈔中說然此二種正行當相須而進凡行住睡臥時則一心稱名凡趺坐時則心心作觀行倦則趺坐以觀佛坐出則經行以稱名苟於四威儀中修之不間往生西方必矣二助行亦有二一世間之行如孝順父母行世仁慈慈心不殺具諸戒律一切利益之事若能回向西方無非助道之行二出世之行如六度萬行種種功德讀誦大乘修諸懺法亦須以回向心而助修之無非淨土行也更有一種微妙助行當歷緣境處處用心如見眷屬當作西方法眷想以淨土法門而開道之令輕愛以一其念永作將來無生眷屬若生恩愛時當念淨土眷屬無有情愛何當得生淨土遠離此愛若生瞋恚時當念淨土眷屬無有觸惱何當往生淨土得離此瞋若受苦時當念淨土無有眾苦但受諸樂若受樂時當念淨土之樂無央無待凡歷緣境皆以此意而推廣之則一切時處無非淨土之助行也第三願者夫淨土舟航要以信為柁行為篙櫓檣願為風帆無柁則無所指南無篙櫓檣則不能運行無風帆則不能破浪疾到故次行以明願也第願有通別有廣狹有徧局通如古德所立回向發願文別則各隨己意廣謂四弘上求下化狹謂量力決志往生局如課誦有時隨眾同發徧則時時發願處處標心但須體合四弘不得師心妄立大率所發之願別勝於通通恐隨人語轉別則自己標心然隨通文而生決志雖通而別若於別文而生濫漫別亦成通又廣勝於狹廣則發心大剋果勝狹則悲願淺獲果劣又徧勝於局局則數數間斷徧則念念圓成如此三法可以期生淨土速覲彌陀一切淨土法門舉不外乎是矣信願持名歷九品四土說靈峰蕅益法師述若欲速脫輪迴之苦莫如持名念佛求生極樂世界若欲決定得生極樂世界又莫如以信為前導願為後鞭信得決願得切雖散心念佛亦必往生信不真願不猛雖一心不亂亦不得生成時云世有此一輩以持名壓捺妄想不知求生故為極力道破云何為信一者信阿彌陀佛願力二者信釋迦文佛教語三者信六方諸佛讚歎夫世間正人君子便無妄語況彌陀釋迦六方諸佛豈有妄語此而不信真不可救故須先生深信勿起疑惑云何為願一切時中厭惡娑婆生死之苦欣慕淨土菩提之樂隨有所作若善若惡善則迴向求生惡則懺願求生更無二志是名為願信願既具則念佛方為正行改惡修善皆為助行隨功力之淺深以分九品四土纖毫不濫只須自己簡察不必旁問他人謂深信切願念佛而念佛時心多散亂者即是下品下生深信切願念佛而念佛時散亂漸少者即是下品中生深信切願念佛而念佛時便不散亂者即是下品上生念到事一心不亂不起貪瞋癡者即是中三品生念到事一心不亂任運先斷見思塵沙亦能伏斷無明者即是上三品生故信願持名者能歷九品的確不謬也故云得生與否全由信願之有無品位高下全由持名之深淺又信願持名消伏業障帶惑往生即是凡聖同居淨土信願持名見思斷盡而往生者即是方便有餘淨土信願持名豁破一分無明而往生者即是實報莊嚴淨土信願持名持到究竟之處無明斷盡而往生者即是常寂光淨土故持名能淨四土亦的確不謬也問曰如何持名能斷無明答曰所持之佛名無論悟與不悟無非一境三諦能持之念心無論達與不達無非一心三觀只為眾生妄想執著情見分別所以不契圓常殊不知能持者即是始覺所持者即是本覺今直下持去持外無佛佛外無持能所不二則始覺合乎本覺名究竟覺矣問曰既始覺合本則當下即常寂光如何亦說往生答曰若達當下即常寂光又何妨說箇往生葢往即非往非往而往生即無生無生而生文殊善財之生西方者此也咄哉男子無措思惟要解云信願持名為修行之宗要非信不足啟願非願不足導行非持名妙行不足滿所願而證所信經中先陳依正以生信次勸發願以導行次示持名以徑登不退信則信自信他信因信果信事信理願則厭離娑婆欣求極樂行則執持名號一心不亂信自者信我現前一念之心本非肉團亦非緣影竪無初後橫絕邊涯終日隨緣終日不變十方虗空微塵國土元我一念心中所現物我雖昏迷倒惑苟一念回心決定得生自心本具極樂更無疑慮是名信自信他者信釋迦如來決無誑語彌陀世尊決無虗願六方諸佛廣長舌決無二言隨順諸佛真實教誨決志求生更無疑惑是名信他信因者深信散亂稱名猶為成佛種子況一心不亂安得不生淨土是名信因信果者深信淨土諸善聚會皆從念佛三昧得生如種瓜得瓜種豆得豆亦如影必隨形響必應聲決無虗棄是名信果信事者深信只今現前一念不可盡故依心所現十方世界亦不可盡實有極樂國在十萬億土外最極清淨莊嚴不同莊生寓言是名信事信理者深信十萬億土實不出我今現前介爾一念心外以吾現前一念心性實無外故又深信西方依正主伴皆吾現前一念心中所現影全事即理全妄即真全修即性全他即自我心徧故佛心亦徧一切眾生心性亦徧譬一室千燈光光互徧重重交攝不相妨礙是名信理如此信已則娑婆即自心所感之薉而自心薉理應厭離極樂即自心所感之淨而自心淨理應欣求厭薉須捨至究竟方無可捨欣淨須取至究竟方無可取故妙宗云取捨若極與不取捨亦非異轍設不從事取捨但尚不取不捨即是執理廢事既廢於事理亦不圓若達全事即理則取亦即理捨亦即理一捨一取無非法界故次信而明願也言執持名號一心不亂者名以召德德不可思議故名號亦不可思議名號功德不可思議故使散稱為佛種執持登不退也然諸經示淨土行萬別千差如觀像觀想禮拜供養五悔六念等一一行成皆生淨土唯持名一法收機最廣下手最易故釋迦慈尊無問自說特向大智舍利弗拈出可謂方便中第一方便了義中無上了義圓頓中最極圓頓故云明珠投於濁水濁水不得不清佛號投於亂心亂心不得不佛也信願持名以為一乘真因四種淨土以為一乘妙果舉因則果必隨之故以信願持名為經正宗信願持名一行不涉施為圓轉五濁唯信乃入非思議所行境界設非本師來入惡世示得菩提以大智大悲見此行此說此眾生何由稟此也哉然吾人處劫濁中決定為時所囿為苦所偪非帶業橫出之行必不能度處見濁中決定為邪智所纏非不假方便之行必不能度處煩惱濁中決定為貪欲所陷惡業所螫非即凡心是佛心之行必不能度處眾生濁中決定安於臭薉而不能洞覺甘於劣弱而不能奮飛非欣厭之行必不能度處命濁中決定為無常所吞石火電光措手不及非不費時劫不勞勤苦之行必不能度若不深知其甚難將謂更有別法可出五濁熢㶿宅裏戲論紛然唯深知其甚難方肎死盡偷心寶此一行此本師及十方諸佛同所宣說可不信乎當知一聲阿彌陀佛即釋迦本師於五濁惡世所得之阿耨多羅三藐三菩提法今以此果覺全體授與濁惡眾生乃諸佛所行境界唯佛與佛能究盡非九界自力所能信解也伏願緇素智愚於此簡易直捷無上圓頓法門勿視為難而輒生退諉勿視為易而漫不䇿勤勿視為淺而妄致藐輕勿視為深而勿敢承任葢所持之名號真實不可思議能持之心性亦真實不可思議持一聲則一聲不可思議持十百千萬無量無數聲聲聲皆不可思議也念佛法門別無奇特只深信力行為要耳佛云若人但念彌陀佛是名無上深妙禪天台云四種三昧同名念佛念佛三昧三昧中王雲棲云一句阿彌陀佛該羅八教圓攝五宗可惜今人將念佛看做淺近勾當謂愚夫愚婦工夫所以信既不深行亦不力終日悠悠淨功莫尅設有巧設方便欲深明此三昧者動以參究誰字為向上殊不知現前一念能念之心本自離過絕非不消作意離絕即現前一句所念之佛亦本是超情離計何勞說妙談元祇貴信得及守得穩直下念去或晝夜十萬五萬三萬以決定不缺為準畢此一生誓無改變若不得往生者三世諸佛便為誑語一得往生永無退轉種種法門咸得現前切忌今日張三明日李四遇教下人又思尋章摘句遇宗門人又思參究問答遇持律人又思搭衣用鉢此則頭頭不了帳帳不清豈知念得阿彌陀佛三藏十二部極則教理都在裏許千七百公案向上機關亦在裏許三千威儀八萬細行三聚淨戒亦在裏許真能念佛放下身心世界即大布施真能念佛不復起貪瞋癡即大持戒真能念佛不計是非人我即大忍辱真能念佛不稍間斷夾雜即大精進真能念佛不復妄想馳逐即大禪定真能念佛不為他岐所惑即大智慧試自檢點若身心世界猶未放下貪瞋癡念猶自現起是非人我猶自掛懷間斷夾雜猶未除盡妄想馳逐猶未永滅種種他岐猶能惑志便不為真念佛也要到一心不亂境界亦無他術最初下手須用數珠記得分明刻定課程決定無缺久久純熟不念自念然後記數亦得不記亦得若初心便要說好看話要不著相要學圓融自在總是信不深行不力饒你講得十二分教下得千七百轉語皆是生死岸邊事臨命終時決用不著珍重淨土十要總序古歙堅密大師撰淨土法門者何法界緣起也何謂法界吾人現前一念之心不唯非塊然亦復非倐爾纔有能起即屬所緣非能緣者不得已強名之曰無相然虗空兔角亦受無相之名而虗空有表顯相兔角有斷無相非真無相又不得已強名此無相曰真唯其無相而真故十方三世依正色心自他凡聖等法皆在我現前一念無相真心中炳然齊現而皆以自心為體非別有物心無相而真從心所現一切諸法莫不無相而真是故於中隨拈一毫末一一皆具十方三世依正色心自他凡聖等法而無餘欠乃至一欬一掉一名一字罔非自心之全體大用而欬掉名字之外更無一法可得此所謂法界也何謂法界緣起聖凡皆此法界非麤妙無減增不涉生死不干迷悟而悟順法界故出生二種涅槃迷逆法界故妄現二種生死迷逆生死法界宛然無奈眾生從未悟故終不能了諸佛菩薩愍之從一真法界起種種因緣世出世間事類無算一介螻螘萬聖互援神力既同慈心亦等而眾生迷逆妄故受化不齊於諸佛菩薩平等光中有有緣無緣及緣中淺深久近之異緣分差等化辨從違若或無緣徒勞引領此所謂法界緣起也是故建化門中只論繫珠一義如法華妙典廣談宿因先聖以四釋闡明因緣釋約教釋本迹釋觀心釋而必以因緣居首由緣匪一故教網弛張由教無方故恩德貫徹指本迹由恩不可窮盡故得消歸自己領納家珍指觀心故知因緣即第一義從上列祖極重時節因緣良以無法與人亦無語句情種熟處假說心傳儻其不然契理而不契機有句盡成非量空花界裏無自立宗華嚴大經王於三藏末後一著歸重願王夫眾生情愛牽連幻成世界妄執緣影遂立前塵觸之則生死浩然究竟皆歸於業海然而業繫之內尚且天經地義萬作孚況諸佛菩薩悲智無涯色心俱寂本真如以起用稱法性以垂機觸之則生死銷亡究竟皆同歸秘藏大事該乎九界深恩施音異於塵年無不從此法界流無不還歸此法界此與六環業繫為何如而可反恣睽違不從標準是旨也精研藏教備考羣宗由忍土而遐攬十虗從末流而曠觀三際則求生淨土一法誠法界第一緣起矣說者謂阿彌願勝駕越諸方然諸佛願等子等心等法性海中那容優劣而千經萬論極口指歸樂十方廣長同聲勸讚光壽者何哉緣在故耳緣何謂在信也何謂不在不信也信不在處惡業障之如夜行者滅火而趨險道如破浪者卷帆而鼓橫橈事同背馳甯止紆曲又諸佛四土上三土容有橫義至同居土大都有竪無橫唯極樂同居橫具四土是故有情以凡夫而例一生補處國土即緣生而顯稱性五塵佛身因應化而見法身真常說法從眾鳥而聞梵音深遠以要言之法法圓融塵塵究竟教海無一名相可筌蹄法門無一因果可比擬然此等希有十方罕聞而唯在極樂者何哉緣深故耳緣何謂深信深也何謂淺信淺也信根淺處恒情域之如朝廷之有資格高才皓齒而不遷如麟鳳之於走飛羽道毛羣而一類何由大方闊步豁破無明又諸佛度生皆窮累劫從凡階聖不退為難今求生極樂但七日竭誠十念傾注雖陷惡逆悉記往生纔得往生便圓踞三不退地且見阿彌即見十方諸佛生極樂即生一切剎海乃至阿彌一光極樂一塵悉能於中頓證十方三世依正色心自他凡聖等法而不出剎那際三昧夫諸佛度生如彼難阿彌度生如此易者何哉緣久故耳緣何謂久信久也何謂近信近也信緣近處時分限之如捨調弓而引彆弣如放馴𩣝而服野駼戰勝之功當在異日如上所論專重有緣緣深則境界難思非等覺十地所能測緣久則神力迅速非三祇百劫所可倫要之阿彌非有加於吾心也吾心一念離絕故聖凡無在吾心萬法頓融故四土無在吾心不屬時劫故十世剎那無在吾心不屬方隅故微塵剎海無在吾何歉乎哉特仗增上因緣一顯發之耳曾有久習神呪者一夜重魘見𤢆物持之置巨石下其人怖急憶誦素所習呪遂見𤢆物倒散裂石而醒設素未習呪或習未純熟緣種不深斯時也欲不寱死得乎然夢中真言復是何物倒𤢆裂石誰實使之皆即我現前一念之心也自心神呪喚醒自心魘人淨土法門亦如是自心之阿彌還度自心之生死故知因緣之義甚深甚深抑聞魘之重者不許持光照照即死不許抱令起抱多失心唯就闇中俾熟識者大呼其名連聲呼之無不解者淨土法門亦如是劫濁盛時眾生魘重毋以持名雜參話毋以麤心習勝觀雜參話則濁智騰波定起邪見所謂照之即死者也習勝觀則非其境界定起魔事所謂抱多失心者也唯以現前一念無明業識之心令其專稱阿彌陀佛名號無間一心未有不親證親到者法門至此愈卑而愈不勝仰愈淺而愈不可俯自呼自應自魘自醒一心之本元頓彰法界之體用全揭無庸鑽仰祇麼修行儻未悟透根源甯可顓蒙合妙夫顓蒙念佛至矣極矣無復加矣但恐法門之戲論難忘生死之天懷不切或執牟尼而視同瓦礫或以指爪而撮摩虗空或抉瞖而與眼以明或傳經而苦舌之鴂如此則揚之與抑總莫暢乎本懷而信之與疑皆不成乎三昧間有大智知進知退知存知亡而未遘至人未獲圓悟未窮極致未學要詮欲升永明之堂入楚石之室居五濁之世闡難信之宗殊非聊爾嗚呼至人幽矣圓悟皇哉若無要詮誰與窮極昔靈峰老人以正法眼選定淨要一書剞劂未全梨棗四散成時竊念像季久轉唯此一門契理契機而淨土諸書唯此諸要盡美盡善爰加點評稍事節略倡募流通而大心緇白共成焉修捨沙門成時合掌稽首重為告曰淨土持名之法有三大要焉一者六字洪名念念之間欣厭具足如出幽獄奔託王家步步之間欣厭具足是故萬緣之唾不食眾苦之忍莫回高置身於蓮華便訂盟於芬利蛆蠅糞壤可煞驚慚二者參禪必不可無淨土為防退墮甯不寒心淨土必不可入禪機意見稍乘二門俱破若夫餘宗在昔之時不必改弦但加善巧迴向在今之世祇可助行必須淨業專修冷煖自知何容強諍三者一句彌陀非大徹不能全提而最愚亦無少欠儻有些子分別便成大法魔殃只貴一心受持甯羨依稀解悟乞兒若見小利急須吐棄無餘棒打石人頭嚗嚗論實事已上三要頗切今時儻能真實指迷我願捨身供養十方三世共聞此言省庵法師勸發菩提心文淨業學人彭際清訂不肖愚下凡夫僧實賢泣血稽顙哀告現前大眾及當世淨信男女等唯願慈悲少加聽察甞聞入道要門發心為首修行急務立願居先願立則眾生可度心發則佛道堪成苟不發廣大心立堅固願則縱經塵劫依然還在輪迴雖有修行總是徒勞辛苦故華嚴經云忘失菩提心修諸善法是名魔業忘失尚爾況未發乎故知欲學如來乘必先具發菩薩願不可緩也然心願差別其相乃多若不指陳如何趣向今為大眾略而言之相有其八所謂邪正真偽大小偏圓是也云何名為邪正真偽大小偏圓耶世有行人一向修行不究自心但知外務或求利養或好名聞或貪現世欲樂或望未來果報如是發心名之為邪既不求利養名聞又不貪欲樂果報唯為生死為菩提如是發心名之為正念念上求佛道心心下化眾生聞佛道長遠不生退怯觀眾生難度不生厭倦如登萬仞之山必窮其頂如上九層之塔必造其顛如是發心名之為真有罪不懺有過不除內濁外清始勤終怠雖有好心多為名利之所夾雜雖有善法復為罪業之所染污如是發心名之為偽眾生界盡我願方盡菩提道成我願方成如是發心名之為大觀三界如牢獄視生死如冤家但期自度不欲度人如是發心名之為小若於心外見有眾生及以佛道願度願成功勛不忘知見不泯如是發心名之為偏若知自性是眾生故願度脫自性是佛道故願成就不見一法離心別有以虗空之心發虗空之願行虗空之行證虗空之果亦無虗空之相可得如是發心名之為圓知此八種差別則知審察知審察則知去取知去取則可發心云何審察謂我所發心於此八中為邪為正為真為偽為大為小為偏為圓云何去取所謂去邪去偽去小去偏取正取真取大取圓如此發心方得名為真正發菩提心也此菩提心諸善中王必有因緣方得發起今言因緣略有十種何等為十一者念佛重恩故二者念父母恩故三者念師長恩故四者念施主恩故五者念眾生恩故六者念死生苦故七者尊重己靈故八者懺悔業障故九者求生淨土故十者為念正法得久住故云何念佛重恩謂我釋迦如來最初發心為我等故行菩薩道經無量劫備受諸苦我造業時佛則哀憐方便教化而我愚癡不知信受我墮地獄佛復悲痛欲代我苦而我業重不能救我生人道佛以方便令種善根世世生生隨逐於我心無暫捨佛初出世我尚沉淪今得人身佛已滅度何罪而生末法何福而預出家何障而不見金身何幸而躬逢舍利如是思惟向使不種善根何以得聞佛法不聞佛法焉知常受佛恩此恩此德邱山難喻自非發廣大心行菩薩道建立佛法救度眾生從使粉骨碎身豈能酬答是為發菩提心第一因緣也云何念父母恩哀哀父母生我劬勞十月三年懷胎乳哺推乾去濕嚥苦吐甘才得成人指望紹繼門風供承祭祀今我等既已出家濫稱釋子忝號沙門甘旨不供祭埽不給生不能養其口體死不能導其神靈於世間則為大損於出世又無實益兩途既失重罪難逃如是思惟唯有百劫千生常行佛道十方三世普度眾生則不唯一生父母生生父母俱蒙濟不唯一人父母人人父母盡可超昇是為發菩提心第二因緣也云何念師長恩父母雖能生育我身若無世間師長則不知禮義若無出世師長則不解佛法不知禮義則同於異類不解佛法則何異俗人今我等粗知禮義略解佛法袈裟被體戒品沾身此之重恩從師長得若求小果僅能自利今為大乘普願利人則世出世間二種師長俱蒙利益是為發菩提心第三因緣也云何念施主恩謂我等今者日用所資並非己有三時粥飯四季衣裳疾病所須身口所費此皆出自他力將為我用從則竭力躬耕尚難餬口我則安坐受食猶不稱心彼則紡織不已猶自艱難我則安服有餘甯知愛惜彼則蓽門蓬戶擾攘終身我則廣宇閒庭優悠卒歲以彼勞而供我逸於心安乎將他利而潤己身於理順乎自非悲智雙運福慧二嚴檀信沾恩眾生受賜則粒米寸絲酬償有分惡報難逃是為發菩提心第四因緣也云何念眾生恩謂我與眾生從曠劫來世世生生互為父母彼此有恩今雖隔世昏迷互不相識以理推之豈無報効今之披毛帶角安知非昔為其子乎今之蝡動蜎飛安知不曾為我父乎每見幼離父母長而容貌都忘何況宿世親緣今則張王難記彼其號呼於地獄之下宛轉於餓鬼之中苦痛誰知飢虗安訴我雖不見不聞彼必求拯求濟非經不能陳此事非佛不能道此言彼邪見人何足以知此是故菩薩觀於螻蟻皆是過去父母未來諸佛常思利益念報其恩是為發菩提心第五因緣也云何念生死苦謂我與眾生從曠劫來常在生死未得解脫人間天上此界他方出沒萬端昇沉片刻俄焉而天俄焉而人俄焉而地獄畜生餓鬼黑門朝出而暮還鐵窟暫離而又入登刀山也則舉體無完膚攀劍樹也則方寸皆割裂熱鐵不除饑吞之則肝腸盡爛洋銅難療渴飲之則骨肉都麋利鋸解之則斷而復續巧風吹之則死已還生猛火城中忍聽呌噑之慘煎熬盤裏但聞苦痛之聲冰凍始凝則狀似青蓮蘂結血肉既裂則身如紅藕華開一夜死生地下每經萬徧一朝苦痛人間已過百年頻煩獄卒疲勞誰信閻翁教誡受時知苦雖悔恨以何追脫已還忘其作業也如故鞭驢出血誰知吾母之悲牽豕就屠焉識乃翁之痛食其子而不知文王尚爾噉其親而未識凡類皆然當年恩愛今作冤家昔日𡨥讐今成骨肉昔為母而今為婦舊是翁而新作夫宿命知之則可羞可恥天眼視之則可笑可憐糞穢叢中十月包藏難過膿血道裏一時倒下可憐少也何知東西莫辨長而有識貪欲便生須臾而老病相尋迅速而無常又至風火交煎神識於中潰亂精血既竭皮肉自外乾枯無一毛而不被針鑽有一竅而皆從刀割龜之將烹其脫殻也猶易神之欲謝其去體也倍難心無常主類商賈而處處奔馳身無定形似房屋而頻頻遷徙大千塵點難窮往返之身四海波濤孰計別離之淚峩峩積骨過彼崇山莽莽橫尸多於大地向使不聞佛語此事誰見誰聞未覩佛經此理焉知焉覺其或依前貪戀仍舊癡迷祇恐萬劫千生一錯百錯人身難得而易失良時易往而難追道路冥冥別離長久三途惡報還自受之痛不可言誰當相代興言及此能不寒心是故宜應斷生死流出愛欲海自他兼濟彼岸同登曠劫殊勛在此一舉是為發菩提心第六因緣也云何尊重己靈謂我現前一心直下與釋迦如來無二無別云何世尊無量劫來早成正覺而我等昏迷顛倒尚做凡夫又佛世尊則具有無量神通智慧功德莊嚴而我等則但有無量業繫煩惱生死纏縛心性是一迷悟天淵靜言思之豈不可耻譬如無價寶珠沒在淤泥視同瓦礫不加愛重是故宜應以無量善法對治煩惱修德有功則性德方顯如珠被濯懸在高幢洞達光明映蔽一切可謂一孤佛化不負己靈是為發菩提心第七因緣也云何懺悔業障經言犯一吉羅如四天王壽五百歲墮泥犁中吉羅小罪尚獲此報何況重罪其報難言今我等日用之中一舉一動恒違戒律一飱一水頻犯尸羅一日所犯亦應無量何況終身歷劫所起之罪更不可言矣且以五戒言之十人九犯少露多藏五戒名為優婆塞戒尚不具足何況沙彌比丘菩薩等戒又不必言矣問其名則曰我比丘也問其實則尚不足為優婆塞也豈不可愧哉當知佛戒不受則已受則不可毀犯不犯則已犯則終必墮落若非自愍愍他自傷傷他身口併切聲淚俱下普為眾生求哀懺悔則千生萬劫惡報難逃是為發菩提心第八因緣也云何求生淨土謂在此土修行其進道也難彼土往生其成佛也易易故一生可致難故累劫未成是以往聖前賢人人趣向千經萬論處處指歸末世修行無越於此然經稱少善不生多福乃致言多福則莫若執持名號言多善則莫若發廣大心是以暫持聖號勝於布施百年一發大心超過修行歷劫葢念佛本期作佛大心不發則雖念奚為發心原為修行淨土不生則雖發易退是則下菩提種畊以念佛之犁道果自然增長乘大願船入於淨土之海西方決定往生是為發菩提心第九因緣也云何令正法久住謂我世尊無量劫來為我等故修菩提道難行能行難忍能忍因圓果滿遂致成佛既成佛已化緣周訖入於涅槃正法像法皆已滅盡僅存末法有教無人邪正不分是非莫辨競爭人我盡逐利名舉目滔滔天下皆是不知佛是何人法是何義僧是何名衰殘至此殆不忍言每一思及不覺淚下我為佛子不能報恩內無益於己外無益於人生無益於時死無益於後天雖高不能覆我地雖厚不能載我極重罪人非我而誰由是痛不可忍計無所出頓忘鄙陋忽發大心雖不能挽回末運於此時决當圖護持正法於來世是故偕諸善友同到道場述為懺摩建茲法會發四十八之大願願願度生期百千劫之深心心心作佛從於今日盡未來際畢此一形誓歸安養即登九品回入娑婆俾得佛日重輝法門再闡僧海澄清於此界人民被化於東方劫運為之更延正法得以久住此則區區真實苦心是為發菩提心第十因緣也如是十緣備識八法周知則趣向有門開發有地相與得此人身居於華夏六根無恙四大輕安具有信心幸無魔障況今我等又得出家又受具戒又遇道場又聞佛法又瞻舍利又修懺法又值善友又具勝緣不於今日發此大心更待何日唯願大眾愍我愚誠憐我苦志同立此願同發是心未發者今發已發者增長已增長者今令相續勿畏難而退怯勿視易而輕浮勿欲速而不久長勿懈怠而無勇猛勿委靡而不振起勿因循而更期待勿因愚鈍而一向無心勿以根淺而自鄙無分譬諸種樹種久則根淺而日深又如磨刀磨久則刀鈍而成利豈可因淺勿種任其自枯因鈍勿磨置之無用又若以修行為苦則不知懈怠尤苦修行則勤勞暫時安樂永劫懈怠則偷安一世受苦多生況乎以淨土為舟航則何愁退轉又得無生為忍力則何慮艱難當知地獄罪人尚發菩提於往劫豈可人倫佛子不立大願於今生無始昏迷往者既不可諫而今覺悟將來猶尚可追然迷而未悟固可哀憐苟知而不行尤為痛惜若懼地獄之苦則精進自生若念無常之速則懈怠不起又須以佛法為鞭䇿善友為提𢹂造次弗離終身依賴則無退失之虞矣勿言一念輕微勿謂虗願無益心真則事實願廣則行深虗空非大心王為大金剛非堅願力最堅大眾誠能不棄我語則菩提眷屬從此聯姻蓮社宗盟自今締好所願同生淨土同見彌陀同化眾生同成正覺則安知未來三十二相百福莊嚴不從今日發心立願而始也願與大眾共勉之幸甚幸甚與茅靜遠居士書云足下造橋事畢可謂莫大之功然居士之心好善無倦一善甫完復作一善美則美矣其如生死大事何苟不以生死大事為急而孳孳為善所作善事如須彌山皆生死業緣有何了日善事彌多生死彌廣一念愛心萬劫纏縛可不懼耶居士世間公案久已參透西方淨業久已修習然而生死心不切家緣撇不下人情謝不去念佛心不專何也將名根不斷耶抑愛念牽纏耶於此二者宜加審察苟不把家緣世事一刀斬斷六字洪名盡力提起欲望娑婆之脫安養之生難矣不生安養而欲脫生死不脫生死而欲免墮落抑又難矣縱一生兩生不失人身濟得甚麼事嗟乎居士慧心如此明利家緣如此豐足繼嗣如此賢能事事適意尚不能放下萬緣一心念佛為天負人耶為人負天耶不以念佛為急而以世間小善為急不以生死大事為先而以人天福報為先是不知先後也居士今日要務惟當謝絕人事一心念佛加以齋戒二字尤為盡美大抵西方佛國非悠悠散善所能致萬劫生死非因循怠惰所能脫無常迅速旦暮即至安得不為之早辦耶衲所知識者甚寡知識之中求可以語此事者為尤寡捨居士一人而深以期望者誰哉儻不以人廢言幸如努力若曰吾不能也則亦無可奈何矣徹悟禪師念佛法語嗣法門人了亮集吾人現前一念之心全真成妄全妄即真終日不變終日隨緣夫不隨佛界之緣而念佛界便念九界不念三乘便念六凡不念人天便念三途不念鬼畜便念地獄以凡在有心不能無念以無念心體唯佛獨證自等覺已還皆悉有念凡起一念必落十界更無有念出十界外以十法界更無外故每起一念為一受生之緣果知此理而不念佛者未之有也若此心能與平等大慈大悲依正功德以及萬德洪名相應即念佛法界也能與菩提心六度萬行相應即念菩薩法界也以無我心與十二因緣相應即念緣覺法界也以無我心觀察四諦即念聲聞法界也或與四禪八定以及上品十善相應即念天法界也若與五戒相應即念人法界也若修戒善等法兼懷瞋慢勝負之心即落修羅法界若以緩輭心念下品十惡即墮畜生法界或以緩急相半心與中品十惡相應便墮餓鬼法界若以猛熾心與上品十惡相應即墮地獄法界也十惡者即殺盜婬妄言綺語惡口兩舌貪瞋邪見是反此則為十善當密自檢點日用所起之念與何界相應者多與何界相應者猛則他日安身立命之處不勞問人矣真為生死發菩提心以深信願持佛名號十六字為念佛法門一大綱宗若真為生死之心不發一切開示皆為戲論世間一切重苦無過生死生死不了生死死生生生死死出一胞胎入一胞胎捨一皮袋取一皮袋苦已不堪況輪迴未出難免墮落猪胞胎狗胞胎無所不鑽驢皮袋馬皮袋何所不取此箇人身最為難得最易打失一念之差便入惡趣三途易入而難出地獄時長而苦重七佛以來猶為蟻子八萬劫後未脫鴿身畜道時長已極鬼獄時長尤倍久經長劫何了何休萬苦交煎無歸無救每一言之身毛卓豎時一念及五內如焚是故即今痛念生死如喪考妣如救頭然也然我有生死我求出離而一切眾生皆在生死皆應出離彼等與我本同一體皆是多生父母未來諸佛若不念普度唯求自利則於理有所虧心有未安況大心不發則外不能感通諸佛內不能契合本性上不能圓成佛道下不能廣利羣生無始恩愛何以解脫無始怨愆何以解釋積劫罪業難以懺除積劫善根難以成熟隨所修行多諸障緣縱有所成終墮偏小故須稱性發大菩提心也然大心既發應修大行而於一切行門之中求其最易下手最易成就至極穩當至極圓頓者則莫如以深信願持佛名號矣所謂深信者釋迦如來決無誑語彌陀世尊決無虗願且以念佛求生之因必感見佛往生之果因不虗棄果無浪得往生傳載臨終瑞相班班列列豈欺我哉如此信已願樂自切以彼土之樂回觀娑婆之苦厭離自深如離廁阬如出牢獄以娑婆之苦遙觀彼土之樂欣樂自切如歸故鄉如奔寶所總之如渴思飲如飢思食如病苦之思良藥如嬰兒之思慈母如避怨家之持刀相迫如墮水火而急求救援果能如此懇切一切境緣莫能引轉矣然後以此信願之心執持名號持一聲是一九蓮種子念一句是一往生正因直須心心相續念念無差唯專唯勤無雜無間愈久愈堅轉持轉切久之久之自成片段入一心不亂矣誠然如此若不往生者釋迦如來便為誑語彌陀世尊便為虗願有是理乎哉世之最可珍重者莫過精神世之最可愛惜者莫過光陰一念淨即佛果緣起一念染即九界生因凡動一念即十界種子可不珍重乎是日已過命亦隨減一寸時光即一寸命光可不愛惜乎苟知精神之可珍重則不浪用則念念執持佛名光陰不虗度則刻刻熏修淨業儻置佛名而別修三乘聖行亦是浪用精神亦是千鈞之弩為鼷鼠而發機況造六凡生死之業乎儻置淨業而別取權乘小果亦是虗度光陰亦是以如意寶珠而貿一衣一食況取人天有漏之果乎如是珍重如是愛惜則心專而佛易感行勤而業易精果得真生淨土親見彌陀時承開示面奉慈音妙悟自心深證法界延一念為長劫促長劫為一念念劫圓融得大自在非自食其珍重愛惜之報乎夫見道而後修道修道而後證道此千聖同途千古不易之定論也然見道豈易言哉若依教乘必大開圓解若依宗門必直透重關然後得論修道否則便為盲修瞎練不免撞牆磕壁墮阬落塹矣唯淨土一門則不然從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在說法但發願持名即得住生此乃佛心佛眼親知親見之境界非彼三乘賢聖所能知見也但當深信佛言依此而發願持名即是以佛知見為知見不必別求悟門也餘門修道必悟後依法修習攝心成定因定發慧因慧斷惑所發之慧有勝劣所斷之惑有淺深然後方可論其退與不退唯此淨土門中唯以信願之心專持名號持至一心不亂淨業即為大成身後決定往生一得往生便永不退轉又餘門修道先須懺其現業若現業不懺即能障道則進修無路矣修淨業者乃帶業往生不須懺業以至心念佛一聲能滅八十億劫生死重罪故又餘門修道須斷煩惱若見思煩惱分毫未盡則分段生死不盡不能出離同居國土唯修淨業乃橫出三界不斷煩惱從此同居生彼同居一生彼土則生死根株便永斷矣既生彼土則常常見佛時時聞法衣食居處出於自然水鳥樹林皆悉說法同居土中橫見上三淨土諸上善人俱會一處圓證三種不退一生便補佛位然則淨土一門最初省求悟門末後不待發慧不須懺業不斷煩惱至極省要至極徑捷及其證入至極廣大至極究竟學者當細心玩味而詳擇之一句佛號不雜異緣十念功成頓超多劫於此不信真同木石捨此別修非狂即癡也吾人現前一念緣生無性無性緣生不生佛界便生九界若約緣生無性則生佛平等一空若約無性緣生則十界勝劣懸殊阿祈達王臨終為驅蠅人以拂拂面一念瞋心遂墮為毒蛇一婦人渡河失手其子墮水因撈子故與之俱沒以慈心故得生天上夫一念慈瞋天畜遂分則此臨終之緣生一念可不慎乎苟以此心緣念彌陀求生淨土得不見佛往生乎但此一念不可僥倖而致必須存之以誠操之有素是故吾輩於此一句彌陀千念萬念以至終日終年念者無非為熟此一念而已果得一念純熟則臨命終時唯此一念更無異念念果如是不見彌陀更見何人不生淨土更生何處只恐吾人自信不及耳現前一念心性本與佛同體佛已久悟而我猶迷佛雖已悟亦無所增我雖猶迷亦無所減佛雖無增以順性故受大法樂我雖無減以背性故遭極重苦佛於同體心性之中雖受法樂以同體大悲無緣大慈念念憶念於我念念攝化於我我於同體心性之中雖遭眾苦不知仰求於佛不知憶念於佛但唯逐境生心循情造業曠大劫來五逆十惡種種重業何所不造三途八難種種大苦何所不受言之可慚思之可怖設今更不念佛依舊埋頭造種種業依舊從頭受種種苦可不愧乎可不懼乎今且知佛以大慈大悲於念念中憶念攝化於我則我今者深感佛恩故應念佛一向長劫枉受眾苦欲求脫苦故應念佛已造之業無可如何未來之業可更造乎生慚愧心故應念佛同體心性既曰本有即今豈無祇欠悟證耳求悟心性故應念佛以求悟心念佛念佛必切以慚愧心念佛念佛必切以畏苦心念佛念佛必切以感恩心念佛念佛必切我不念佛佛尚念我我今懇切念佛佛必轉更念我矣知小而不知大見近而不見遠者此眾生之常分也如何彌陀佛於諸眾生有大恩德眾生不知也佛於無量劫前對世自在王佛普為惡世界苦眾生發四十八種大願依願久經長劫修菩薩行捨金輪王位國城妻子頭目腦髓不知幾千萬億此但萬行中內外財布施一行也如是忍人所不能忍行人所不能行圓修萬行力極功純嚴成淨土自致成佛分身無量接引眾生方便攝化今生彼國然則如為一人眾多亦然如為眾多一人亦然若以眾多觀之佛則普為一切眾生也若以一人觀之佛則專為我一人也稱性大願為我發也長劫大行為我修也四土為我嚴淨也三身為我圓滿也以致頭頭現身接引處處顯示瑞應總皆為我也我造業時佛則警覺我我受苦時佛則拔濟我我歸命時佛則攝受我我修行時佛則加被我佛之所以種種為我者不過欲我念佛也欲我往生也欲我永脫眾苦廣受法樂也欲我展轉化度一切眾生直至一生補佛而後已也噫佛之深恩重德非父母所可比雖天地不足以喻其高厚矣非聞開示安知此意不讀佛經安曉此理今而後已知之矣唯有竭力精修盡報歸誠𢬵命念佛而已復何言哉蓮宗必讀後跋夫信願持名乃速脫輪迴之最勝方便靈峰云倘信願不真雖一心不亂亦不得生若信願猛利雖散心念佛亦必往生徹悟云只將信願二法常存在心如忠臣之奉聖君密旨孝子之受慈父嚴命不論多念少念皆為往生正因故信願持名為修行之宗要不可忽諸戀西大師所編蓮宗必讀專重信願持名一法乃深契一行三昧之旨不但令多障有情依斯徑登不退又可使疑惑之徒信而有勇誠苦海之慈航昏衢之慧日也又自序一章將釋迦徹底之悲心彌陀普被之大願淨土之要綱持名之妙訣統括在一序之中不唯言簡意周且使淨土深旨無餘蘊矣予初一讀喜出望外如貧得寶如暗得燈雖淨土諸書如山積其中不無藥忌之嫌唯此一書頗切今時盡善盡美如矢必應弦藥必應病名之曰必讀夫復何疑請即流通以結淨緣師曰謬集諸文流通何益但自作鞭䇿耳因堅請不已遂囑予較訂付之奇厥所願凡同志者共為披讀了然知生信發願以起妙行而速脫輪迴永階不退未有逾此者也敬䟦數語以識法喜同治戊辰遺訥諗西書於甯郡之大歡喜菴
